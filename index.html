              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Stats View ───────────────────────────────────────────────────────────────
function StatsView({ tasks, logs, timezone, goals }) {
  const allDates     = Object.keys(logs).sort();
  const totalDays    = allDates.length;

  const completeDays = allDates.filter(d => {
    const ap = tasks.filter(t => taskAppliesToDate(t,d));
    return ap.length>0 && ap.every(t => logs[d]?.[t.id]);
  }).length;

  // Imperfect days: had tasks but completed < 50%
  const imperfectDays = allDates.filter(d => {
    const ap   = tasks.filter(t => taskAppliesToDate(t,d));
    const done = ap.filter(t => logs[d]?.[t.id]).length;
    return ap.length>0 && done>0 && done/ap.length < 0.5;
  }).length;

  // Missed days: had tasks but completed 0
  const missedDays = allDates.filter(d => {
    const ap   = tasks.filter(t => taskAppliesToDate(t,d));
    const done = ap.filter(t => logs[d]?.[t.id]).length;
    return ap.length>0 && done===0;
  }).length;

  // Current streak (consecutive perfect days ending today)
  const currentStreak = (() => {
    let s = 0;
    const d = new Date();
    for (let i = 0; i < 366; i++) {
      const key = d.toLocaleDateString("en-CA", { timeZone: timezone });
      const ap  = tasks.filter(t => taskAppliesToDate(t,key));
      if (ap.length === 0) { d.setDate(d.getDate()-1); continue; }
      if (ap.every(t => logs[key]?.[t.id])) { s++; d.setDate(d.getDate()-1); }
      else break;
    }
    return s;
  })();

  const taskStats = tasks.map(t => {
    const applicable = allDates.filter(d => taskAppliesToDate(t,d));
    const done       = applicable.filter(d => logs[d]?.[t.id]).length;
    return { ...t, rate: applicable.length ? Math.round(done/applicable.length*100) : 0 };
  });

  // Category-level aggregation
  const catColors = { Health:"#10b981", Career:"#3b82f6", Learning:"#a855f7", Finance:"#eab308", Personal:"#f43f5e", Creative:"#ec4899", Social:"#06b6d4", Work:"#3b82f6", Other:"#f97316" };
  const categories = [...new Set(tasks.map(t => t.category||"Other"))].sort();
  const catStats = categories.map(cat => {
    const catTasks = taskStats.filter(t => (t.category||"Other") === cat);
    const avgRate  = catTasks.length ? Math.round(catTasks.reduce((s,t)=>s+t.rate,0)/catTasks.length) : 0;
    return { cat, color: catColors[cat]||"#f97316", rate: avgRate, tasks: catTasks };
  });

  const last14 = Array(14).fill(null).map((_,i) => {
    const d   = new Date(); d.setDate(d.getDate()-(13-i));
    const key = d.toLocaleDateString("en-CA",{timeZone:timezone});
    const ap  = tasks.filter(t => taskAppliesToDate(t,key));
    const done = ap.filter(t => (logs[key]||{})[t.id]).length;
    return { day:WEEKDAYS[d.getDay()], pct:ap.length?Math.round(done/ap.length*100):0 };
  });

  const cards = [
    { label:"PERFECT DAYS",   value:completeDays,   color:"#10b981", sub:"100% tasks done",        icon:"✦" },
    { label:"IMPERFECT DAYS", value:imperfectDays,  color:"#eab308", sub:"below 50% tasks done",   icon:"◑" },
    { label:"MISSED DAYS",    value:missedDays,      color:"#f43f5e", sub:"0 tasks completed",      icon:"✕" },
    { label:"STREAK",         value:currentStreak,  color:"#f97316", sub:"consecutive perfect days",icon:"🔥" },
  ];

  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:10, marginBottom:18 }}>
        {cards.map(c => (
          <div key={c.label} style={{ background:"#0e0e1d", border:`1px solid ${c.color}22`, borderRadius:10, padding:16, position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:10, right:12, fontSize:18, opacity:.15 }}>{c.icon}</div>
            <div style={{ fontFamily:"'Syne',sans-serif", fontSize:32, fontWeight:800, color:c.color, lineHeight:1 }}>{c.value}</div>
            <div style={{ fontSize:10, letterSpacing:"1.5px", color:"#b0b0c8", marginTop:5, textTransform:"uppercase" }}>{c.label}</div>
            <div style={{ fontSize:9, color:"#6e6e8a", marginTop:3, letterSpacing:".3px" }}>{c.sub}</div>
          </div>
        ))}
      </div>

      <div style={{ background:"#0e0e1d", border:"1px solid #181830", borderRadius:10, padding:16, marginBottom:12 }}>
        <div style={{ fontSize:11, letterSpacing:"2px", color:"#a0a0bc", marginBottom:13, textTransform:"uppercase" }}>14-Day Completion %</div>
        <div style={{ display:"flex", alignItems:"flex-end", gap:4, height:110, paddingBottom:20, position:"relative" }}>
          {/* Y gridlines */}
          {[25,50,75,100].map(y => (
            <div key={y} style={{ position:"absolute", left:0, right:0, bottom: 20 + (y/100)*90, height:1, background:"#1a1a2e", zIndex:0 }} />
          ))}
          {last14.map((e,i) => {
            const barH = Math.max(2, Math.round((e.pct/100)*90));
            const fill  = e.pct===100?"#10b981":e.pct>0?"#f97316":"#1e1e38";
            return (
              <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4, height:"100%", justifyContent:"flex-end", position:"relative", zIndex:1 }}>
                {e.pct > 0 && (
                  <div style={{ fontSize:8, color:fill, letterSpacing:".3px", marginBottom:1 }}>{e.pct}%</div>
                )}
                <div title={`${e.day}: ${e.pct}%`}
                  style={{ width:"100%", height:barH, background:fill, borderRadius:"3px 3px 0 0", transition:"height 0.8s ease", cursor:"default" }} />
                <div style={{ fontSize:9, color:"#525270", marginTop:2, letterSpacing:".3px" }}>{e.day}</div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ background:"#0e0e1d", border:"1px solid #181830", borderRadius:10, padding:16 }}>
        <div style={{ fontSize:11, letterSpacing:"2px", color:"#a0a0bc", marginBottom:3, textTransform:"uppercase" }}>Category Consistency</div>
        <div style={{ fontSize:10, color:"#6e6e8a", marginBottom:14 }}>Tap a category to see individual tasks</div>
        {catStats.length===0 && <div style={{ color:"#525270", fontSize:13, textAlign:"center", padding:"20px 0" }}>No tasks yet.</div>}
        {catStats.map(({ cat, color, rate, tasks:catTasks }) => (
          <CategoryRow key={cat} cat={cat} color={color} rate={rate} catTasks={catTasks} />
        ))}
      </div>

      {/* ── Missed Days Heatmap ── */}
      <div style={{ background:"#0e0e1d", border:"1px solid #181830", borderRadius:10, padding:16, marginTop:12 }}>
        <div style={{ fontSize:11, letterSpacing:"2px", color:"#a0a0bc", marginBottom:4, textTransform:"uppercase" }}>Missed Days — Last 60 Days</div>
        <div style={{ fontSize:11, color:"#6e6e8a", marginBottom:13 }}>Each cell = one day. Red = missed tasks, green = completed, dark = no tasks scheduled.</div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:3 }}>
          {Array(60).fill(null).map((_,i) => {
            const d   = new Date(); d.setDate(d.getDate()-(59-i));
            const key = d.toLocaleDateString("en-CA",{timeZone:timezone});
            const ap  = tasks.filter(t => taskAppliesToDate(t,key));
            const done = ap.filter(t => (logs[key]||{})[t.id]).length;
            const isFuture = d > new Date();
            let bg = "#131328", title = fmtDate(key);
            if (!isFuture && ap.length > 0) {
              const p = done/ap.length;
              bg = p === 1 ? "#10b981" : p >= 0.5 ? "#f97316" : p > 0 ? "#c2410c" : "#f43f5e44";
              title = `${fmtDate(key)}: ${done}/${ap.length} tasks (${Math.round(p*100)}%)`;
            }
            const isToday = d.toDateString() === new Date().toDateString();
            return (
              <div key={i} className="heat-cell" title={title}
                style={{ width:16, height:16, borderRadius:3, background:isFuture?"#0d0d1a":bg, border:isToday?"1.5px solid #f97316":"1px solid #0d0d1a", flexShrink:0 }} />
            );
          })}
        </div>
        <div style={{ display:"flex", gap:14, marginTop:12, flexWrap:"wrap" }}>
          {[["#10b981","All done"],["#f97316","50–99%"],["#c2410c","1–49%"],["#f43f5e44","0% (missed)"],["#131328","No tasks"]].map(([c,l])=>(
            <div key={l} style={{ display:"flex", alignItems:"center", gap:5, fontSize:10, color:"#a0a0bc" }}>
              <div style={{ width:10, height:10, borderRadius:2, background:c, border:"1px solid #525270" }}/> {l}
            </div>
          ))}
        </div>
      </div>

      {/* ── Overdue Milestones across all goals ── */}
      {(() => {
        const today = new Date(); today.setHours(0,0,0,0);
        const overdueMilestones = (goals||[]).flatMap(g =>
          (g.milestones||[])
            .filter(m => !m.done && m.deadline && new Date(m.deadline+"T00:00:00") < today)
            .map(m => ({ ...m, goalName:g.name, goalColor:(catColors||{})[g.category]||"#f97316", daysOverdue: Math.round((today - new Date(m.deadline+"T00:00:00"))/864e5) }))
        ).sort((a,b) => b.daysOverdue - a.daysOverdue);
        const catColors = { Health:"#10b981", Career:"#3b82f6", Learning:"#a855f7", Finance:"#eab308", Personal:"#f43f5e", Other:"#f97316" };
        if (!overdueMilestones.length) return null;
        return (
          <div style={{ background:"#120808", border:"1px solid #f43f5e33", borderRadius:10, padding:16, marginTop:12 }}>
            <div style={{ fontSize:11, letterSpacing:"2px", color:"#f43f5e", marginBottom:13, textTransform:"uppercase", display:"flex", alignItems:"center", gap:6 }}>
              ⚡ Overdue Milestones
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {overdueMilestones.map(m => (
                <div key={m.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:"#1a0a0a", borderRadius:7, padding:"9px 12px", border:"1px solid #f43f5e22" }}>
                  <div>
                    <div style={{ fontSize:12, color:"#f87090" }}>{m.name}</div>
                    <div style={{ fontSize:10, color:"#483030", marginTop:3 }}>
                      {m.goalName} · due {fmtDate(m.deadline)}
                    </div>
                  </div>
                  <div style={{ background:"#f43f5e22", color:"#f43f5e", border:"1px solid #f43f5e44", borderRadius:5, padding:"3px 9px", fontSize:10, letterSpacing:"1px", flexShrink:0 }}>
                    {m.daysOverdue}d late
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ─── Goals View ───────────────────────────────────────────────────────────────
function GoalsView({ goals, setGoals, onAdd }) {
  const catColors = { Health:"#10b981", Career:"#3b82f6", Learning:"#a855f7", Finance:"#eab308", Personal:"#f43f5e", Other:"#f97316" };
  const [expandedGoal, setExpandedGoal] = useState(null);
  const [msModal, setMsModal] = useState(null); // goalId when open
  const [editMs, setEditMs] = useState(null);   // { goalId, milestone } for inline edit

  const addMilestone = (goalId, ms) => {
    setGoals(prev => prev.map(g => g.id !== goalId ? g : {
      ...g,
      milestones: [...(g.milestones||[]), { ...ms, id:"m"+Date.now(), done:false, createdAt: new Date().toISOString().slice(0,10) }],
      target: (g.milestones||[]).length + 1,
    }));
    setMsModal(null);
  };

  const deleteMilestone = (goalId, msId) => {
    setGoals(prev => prev.map(g => {
      if (g.id !== goalId) return g;
      const milestones = (g.milestones||[]).filter(m => m.id !== msId);
      return { ...g, milestones, target: Math.max(1, milestones.length), current: milestones.filter(m=>m.done).length };
    }));
  };

  const toggleMilestone = (goalId, msId) => {
    setGoals(prev => prev.map(g => {
      if (g.id !== goalId) return g;
      const milestones = (g.milestones||[]).map(m => m.id===msId ? { ...m, done:!m.done } : m);
      return { ...g, milestones, current: milestones.filter(m=>m.done).length };
    }));
  };

  const saveEditMs = (goalId, msId, name, deadline) => {
    setGoals(prev => prev.map(g => {
      if (g.id !== goalId) return g;
      return { ...g, milestones: (g.milestones||[]).map(m => m.id===msId ? { ...m, name, deadline } : m) };
    }));
    setEditMs(null);
  };

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
        <div style={{ fontSize:11, letterSpacing:"2px", color:"#a0a0bc", textTransform:"uppercase" }}>Long-Term Goals</div>
        <button onClick={onAdd} className="btn-glow"
          style={{ display:"flex", alignItems:"center", gap:6, background:"#f97316", border:"none", borderRadius:6, padding:"6px 14px", color:"#fff", fontSize:11, fontFamily:"inherit", cursor:"pointer", letterSpacing:"1px" }}>
          <Icon name="plus" size={12} /> ADD GOAL
        </button>
      </div>

      {goals.length===0 && (
        <div style={{ textAlign:"center", padding:"60px 20px", color:"#525270" }}>
          <div style={{ fontSize:32, marginBottom:12 }}>◎</div>
          <div style={{ fontSize:13 }}>Set your first long-term goal</div>
        </div>
      )}

      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        {goals.map(g => {
          const milestones = g.milestones || [];
          const hasMilestones = milestones.length > 0;
          const doneMilestones = milestones.filter(m => m.done).length;
          const current = hasMilestones ? doneMilestones : g.current;
          const target  = hasMilestones ? milestones.length : g.target;
          const pct     = target > 0 ? Math.round((current / target) * 100) : 0;
          const color   = catColors[g.category] || "#f97316";
          const isOpen  = expandedGoal === g.id;

          return (
            <div key={g.id} className="goal-card"
              style={{ background:"#0e0e1d", border:`1px solid ${isOpen ? color+"44" : "#181830"}`, borderRadius:14, overflow:"hidden" }}>

              {/* ── Goal Header ── */}
              <div style={{ padding:"16px 18px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                  <div style={{ flex:1, minWidth:0, marginRight:12 }}>
                    <div style={{ fontSize:15, fontWeight:500, color:"#fff", marginBottom:5 }}>{g.name}</div>
                    <div style={{ fontSize:11, color:"#a0a0bc", display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
                      <span style={{ background:color+"1a", color, padding:"2px 8px", borderRadius:4, fontSize:10, letterSpacing:"1px" }}>{g.category}</span>
                      {g.deadline && <span>Due: {fmtDate(g.deadline)}</span>}
                      {hasMilestones && (
                        <span style={{ color:"#b0b0c8", display:"flex", alignItems:"center", gap:3 }}>
                          <Icon name="milestone" size={10} /> {doneMilestones}/{milestones.length} milestones
                        </span>
                      )}
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:6, alignItems:"center", flexShrink:0 }}>
                    <div style={{ fontFamily:"'Syne',sans-serif", fontSize:22, fontWeight:800, color }}>{pct}%</div>
                    <button onClick={() => setExpandedGoal(isOpen ? null : g.id)}
                      style={{ background:"#13132a", border:"1px solid #525270", borderRadius:6, cursor:"pointer", color:"#c0bdd8", padding:"5px 7px", display:"flex" }}>
                      <Icon name={isOpen ? "chevup" : "chev"} size={12} />
                    </button>
                    <button onClick={() => setGoals(p=>p.filter(x=>x.id!==g.id))} style={{ background:"none", border:"none", cursor:"pointer", color:"#525270", padding:4, display:"flex" }}><Icon name="trash" size={13} /></button>
                  </div>
                </div>

                {/* Progress bar */}
                <div style={{ background:"#13132a", borderRadius:4, height:7, overflow:"hidden", marginBottom: hasMilestones ? 6 : 12 }}>
                  <div style={{ height:"100%", width:`${Math.min(100,pct)}%`, background:pct===100?"#10b981":color, borderRadius:4, transition:"width 0.8s" }} />
                </div>

                {/* Milestone progress chips */}
                {hasMilestones && (
                  <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginBottom:8 }}>
                    {milestones.map(m => (
                      <div key={m.id} title={m.name}
                        style={{ width:16, height:16, borderRadius:3, background: m.done ? color : "#1e1e38", border:`1px solid ${m.done ? color : "#6e6e8a"}`, cursor:"pointer", transition:"all 0.15s" }}
                        onClick={() => toggleMilestone(g.id, m.id)} />
                    ))}
                  </div>
                )}

                {/* Manual counter (only when no milestones) */}
                {!hasMilestones && (
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ fontSize:11, color:"#a0a0bc" }}>{g.unit}:</span>
                    <input type="number" value={g.current}
                      onChange={e => setGoals(p=>p.map(x=>x.id===g.id?{...x,current:Math.min(x.target,Math.max(0,Number(e.target.value)))}:x))}
                      style={{ width:80, background:"#13132a", border:"1px solid #525270", borderRadius:5, padding:"4px 8px", color:"#fff", fontSize:12, outline:"none" }} />
                    <span style={{ fontSize:11, color:"#a0a0bc" }}>/ {g.target} {g.unit}</span>
                  </div>
                )}

                {g.notes && <div style={{ marginTop:10, fontSize:12, color:"#a0a0bc", borderLeft:`3px solid ${color}`, paddingLeft:10, lineHeight:1.6 }}>{g.notes}</div>}
              </div>

              {/* ── Milestones Panel ── */}
              {isOpen && (
                <div style={{ borderTop:"1px solid #181830", padding:"14px 18px", background:"#0b0b18" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
                    <div style={{ fontSize:10, letterSpacing:"2px", color:"#a0a0bc", textTransform:"uppercase", display:"flex", alignItems:"center", gap:6 }}>
                      <Icon name="milestone" size={11} /> Milestones
                    </div>
                    <button onClick={() => setMsModal(g.id)}
                      style={{ display:"flex", alignItems:"center", gap:5, background:"#13132a", border:"1px solid #525270", borderRadius:6, padding:"5px 11px", color:"#c0bdd8", fontSize:11, fontFamily:"inherit", cursor:"pointer" }}>
                      <Icon name="plus" size={11} /> Add
                    </button>
                  </div>

                  {milestones.length === 0 && (
                    <div style={{ fontSize:12, color:"#525270", textAlign:"center", padding:"16px 0" }}>No milestones yet. Add one to break this goal into steps.</div>
                  )}

                  {/* ── Missed overview banner ── */}
                  {(() => {
                    const today = new Date(); today.setHours(0,0,0,0);
                    const overdue = milestones.filter(m => !m.done && m.deadline && new Date(m.deadline+"T00:00:00") < today);
                    if (!overdue.length) return null;
                    return (
                      <div style={{ background:"#1a080a", border:"1px solid #f43f5e44", borderRadius:8, padding:"9px 13px", marginBottom:12, display:"flex", alignItems:"center", gap:8 }}>
                        <span style={{ fontSize:18 }}>⚠</span>
                        <div>
                          <div style={{ fontSize:12, color:"#f43f5e", fontWeight:500 }}>{overdue.length} milestone{overdue.length>1?"s":""} overdue</div>
                          <div style={{ fontSize:11, color:"#843040", marginTop:2 }}>{overdue.map(m=>m.name).join(" · ")}</div>
                        </div>
                      </div>
                    );
                  })()}

                  {/* ── Timeline track (if any have deadlines) ── */}
                  {milestones.some(m => m.deadline) && (() => {
                    const today = new Date(); today.setHours(0,0,0,0);
                    const sorted = [...milestones].filter(m=>m.deadline).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
                    const earliest = new Date(sorted[0].deadline+"T00:00:00");
                    const latest   = new Date(sorted[sorted.length-1].deadline+"T00:00:00");
                    const refStart = new Date(Math.min(today.getTime(), earliest.getTime()));
                    refStart.setDate(refStart.getDate()-7);
                    const refEnd   = new Date(latest); refEnd.setDate(refEnd.getDate()+7);
                    const span     = refEnd - refStart;
                    const pctOf    = d => Math.max(0,Math.min(100,(new Date(d+"T00:00:00")-refStart)/span*100));
                    const nowPct   = Math.max(0,Math.min(100,(today-refStart)/span*100));
                    return (
                      <div style={{ background:"#0d0d1c", border:"1px solid #181830", borderRadius:8, padding:"12px 14px", marginBottom:14 }}>
                        <div style={{ fontSize:9, letterSpacing:"1.5px", color:"#6e6e8a", marginBottom:10, textTransform:"uppercase" }}>Deadline Timeline</div>
                        <div style={{ position:"relative", height:28, background:"#13132a", borderRadius:5 }}>
                          {/* today line */}
                          <div style={{ position:"absolute", left:`${nowPct}%`, top:0, bottom:0, width:2, background:"#ffffff30", zIndex:2 }}>
                            <div style={{ position:"absolute", top:-1, left:-3, width:8, height:8, borderRadius:"50%", background:"#fff", opacity:.4 }}/>
                          </div>
                          {sorted.map(m => {
                            const isOverdue = !m.done && new Date(m.deadline+"T00:00:00") < today;
                            const dotColor  = m.done ? "#10b981" : isOverdue ? "#f43f5e" : color;
                            return (
                              <div key={m.id} title={`${m.name} — ${fmtDate(m.deadline)}`}
                                style={{ position:"absolute", left:`${pctOf(m.deadline)}%`, top:"50%", transform:"translate(-50%,-50%)", width:14, height:14, borderRadius:"50%", background:dotColor, border:`2px solid ${dotColor}55`, zIndex:3, cursor:"default" }} />
                            );
                          })}
                        </div>
                        <div style={{ display:"flex", justifyContent:"space-between", marginTop:5 }}>
                          <span style={{ fontSize:9, color:"#6e6e8a" }}>{refStart.toLocaleDateString("en-GB",{day:"numeric",month:"short"})}</span>
                          <span style={{ fontSize:9, color:"#b0b0c8" }}>TODAY</span>
                          <span style={{ fontSize:9, color:"#6e6e8a" }}>{refEnd.toLocaleDateString("en-GB",{day:"numeric",month:"short"})}</span>
                        </div>
                      </div>
                    );
                  })()}

                  {/* ── Milestone rows ── */}
                  <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                    {milestones.map(m => {
                      const isEditing = editMs?.goalId === g.id && editMs?.milestone?.id === m.id;
                      const today = new Date(); today.setHours(0,0,0,0);

                      // Deadline metadata — for labels/badges only, NOT for bar fill
                      let daysLeft = null, isOverdue = false;
                      if (m.deadline) {
                        const dl = new Date(m.deadline+"T00:00:00");
                        isOverdue = !m.done && dl < today;
                        daysLeft  = Math.round((dl - today) / 864e5);
                      }

                      // ── Completion bar: 0% = not done, 100% = done ──
                      // The bar ONLY fills when the user ticks the milestone/task.
                      const completionPct = m.done ? 100 : 0;
                      const barColor      = m.done ? "#10b981" : isOverdue ? "#f43f5e" : color;

                      // Deadline urgency level (used for segment coloring & label only)
                      const urgencyLevel = !m.deadline || m.done ? null
                        : isOverdue ? "overdue"
                        : daysLeft <= 7  ? "final"
                        : daysLeft <= 21 ? "late"
                        : daysLeft <= 60 ? "mid"
                        : "early";

                      return (
                        <div key={m.id} className={`ms-row${isOverdue?" ms-overdue":""}`}
                          style={{ padding:"10px 12px", background: isOverdue?"#120a0a":"#0e0e1d", border:`1px solid ${isOverdue?"#f43f5e33":m.done?"#1e3a1e":"#1a1a30"}`, borderRadius:9 }}>

                          {isEditing ? (
                            <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                              <div onClick={() => toggleMilestone(g.id, m.id)}
                                style={{ width:18, height:18, borderRadius:4, border:`2px solid ${m.done?color:"#6e6e8a"}`, background:m.done?color:"transparent", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", flexShrink:0 }}>
                                {m.done && <Icon name="check" size={10} />}
                              </div>
                              <InlineMsEdit
                                initial={m}
                                onSave={(name, deadline) => saveEditMs(g.id, m.id, name, deadline)}
                                onCancel={() => setEditMs(null)}
                              />
                            </div>
                          ) : (
                            <>
                              {/* Top row: checkbox + name + badges + actions */}
                              <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
                                <div onClick={() => toggleMilestone(g.id, m.id)}
                                  style={{ width:18, height:18, borderRadius:4, border:`2px solid ${m.done?color:isOverdue?"#f43f5e":"#6e6e8a"}`, background:m.done?color:"transparent", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", flexShrink:0, marginTop:1, transition:"all 0.15s" }}>
                                  {m.done && <Icon name="check" size={10} />}
                                </div>
                                <div style={{ flex:1, minWidth:0 }}>
                                  <div style={{ display:"flex", alignItems:"center", gap:7, flexWrap:"wrap" }}>
                                    <span style={{ fontSize:13, color:m.done?"#a0a0bc":isOverdue?"#f87090":"#d8d6e8", textDecoration:m.done?"line-through":"none", transition:"color 0.15s" }}>{m.name}</span>
                                    {isOverdue && <span className="overdue-badge">⚡ {Math.abs(daysLeft)}d overdue</span>}
                                    {m.done && <span style={{ fontSize:9, color:"#10b981", letterSpacing:"1px", textTransform:"uppercase", background:"#10b98118", padding:"2px 6px", borderRadius:3 }}>✓ completed</span>}
                                  </div>
                                  {m.deadline && (
                                    <div style={{ fontSize:10, marginTop:3, display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                                      <span style={{ color:"#6e6e8a", display:"flex", alignItems:"center", gap:3 }}>
                                        <Icon name="calendar" size={9}/> {fmtDate(m.deadline)}
                                      </span>
                                      {!m.done && !isOverdue && daysLeft !== null && (
                                        <span style={{ color: daysLeft <= 7 ? "#f97316" : daysLeft <= 21 ? "#eab308" : "#a0a0bc" }}>
                                          {daysLeft === 0 ? "due today" : `${daysLeft}d left`}
                                        </span>
                                      )}
                                    </div>
                                  )}
                                </div>
                                <div style={{ display:"flex", gap:4, flexShrink:0, alignItems:"flex-start" }}>
                                  <button onClick={() => setEditMs({ goalId:g.id, milestone:m })}
                                    style={{ background:"none", border:"none", cursor:"pointer", color:"#6e6e8a", padding:3, display:"flex" }}><Icon name="edit" size={12} /></button>
                                  <button onClick={() => deleteMilestone(g.id, m.id)}
                                    style={{ background:"none", border:"none", cursor:"pointer", color:"#6e6e8a", padding:3, display:"flex" }}><Icon name="trash" size={12} /></button>
                                </div>
                              </div>

                              {/* ── Completion progress bar (task-driven only) ── */}
                              <div style={{ marginTop:9 }}>
                                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5 }}>
                                  <span style={{ fontSize:9, color:"#6e6e8a", letterSpacing:"1px", textTransform:"uppercase" }}>
                                    {m.done ? "Completed" : "Completion"}
                                  </span>
                                  <span style={{ fontSize:9, color: barColor, letterSpacing:".5px", fontWeight:500 }}>
                                    {m.done ? "✓ 100%" : "0% — tick the task to complete"}
                                  </span>
                                </div>

                                {/* Single progress bar — only fills on task completion */}
                                <div className="ms-progress-track" style={{ position:"relative" }}>
                                  <div style={{
                                    height:"100%",
                                    width:`${completionPct}%`,
                                    background: barColor,
                                    borderRadius:3,
                                    transition:"width 0.7s cubic-bezier(0.4,0,0.2,1)",
                                    position:"relative",
                                    overflow:"hidden"
                                  }}>
                                    {m.done && (
                                      <div style={{ position:"absolute", inset:0, background:"linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent)", backgroundSize:"200% 100%", animation:"shimmer 2.5s infinite" }} />
                                    )}
                                  </div>
                                </div>

                                {/* Deadline urgency indicator (separate from completion bar) */}
                                {urgencyLevel && (
                                  <div style={{ display:"flex", gap:2, marginTop:5 }}>
                                    {[
                                      { key:"early",   label:"Early",  c:"#10b981" },
                                      { key:"mid",     label:"Mid",    c:"#eab308" },
                                      { key:"late",    label:"Late",   c:"#f97316" },
                                      { key:"final",   label:"Final",  c:"#f43f5e" },
                                      { key:"overdue", label:"",       c:"#f43f5e" },
                                    ].filter(s => s.key !== "overdue").map((seg, i, arr) => {
                                      const levels = ["early","mid","late","final","overdue"];
                                      const segLevel = levels.indexOf(seg.key);
                                      const curLevel = levels.indexOf(urgencyLevel);
                                      const isActive = curLevel >= segLevel;
                                      return (
                                        <div key={seg.key} style={{ flex:1, height:2, borderRadius:1, background: isActive ? seg.c : "#1e1e38", transition:"background 0.4s" }}
                                          title={`Deadline urgency: ${seg.label}`} />
                                      );
                                    })}
                                  </div>
                                )}
                                {urgencyLevel && (
                                  <div style={{ fontSize:9, color:"#6e6e8a", marginTop:3, letterSpacing:".5px", textAlign:"right" }}>
                                    deadline urgency: <span style={{ color: urgencyLevel==="overdue"||urgencyLevel==="final" ? "#f43f5e" : urgencyLevel==="late" ? "#f97316" : urgencyLevel==="mid" ? "#eab308" : "#10b981" }}>
                                      {urgencyLevel === "overdue" ? "overdue" : urgencyLevel === "final" ? "this week" : urgencyLevel === "late" ? "3 weeks" : urgencyLevel === "mid" ? "2 months" : "on track"}
                                    </span>
                                  </div>
                                )}
                              </div>
                            </>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Milestone add modal */}
      {msModal && (
        <MilestoneModal
          onClose={() => setMsModal(null)}
          onSave={ms => addMilestone(msModal, ms)}
        />
      )}
    </div>
  );
}

// ─── Inline Milestone Edit ────────────────────────────────────────────────────
function InlineMsEdit({ initial, onSave, onCancel }) {
  const [name, setName] = useState(initial.name);
  const [deadline, setDeadline] = useState(initial.deadline || "");
  return (
    <div style={{ display:"flex", alignItems:"center", gap:6, flex:1, flexWrap:"wrap" }}>
      <input value={name} onChange={e=>setName(e.target.value)} autoFocus
        style={{ ...inputStyle, flex:1, minWidth:100, padding:"5px 8px", fontSize:12 }} />
      <input type="date" value={deadline} onChange={e=>setDeadline(e.target.value)}
        style={{ ...inputStyle, width:140, padding:"5px 8px", fontSize:12 }} />
      <button onClick={() => onSave(name.trim()||initial.name, deadline)}
        style={{ background:"#f97316", border:"none", borderRadius:5, padding:"5px 10px", color:"#fff", fontFamily:"inherit", fontSize:11, cursor:"pointer" }}>✓</button>
      <button onClick={onCancel}
        style={{ background:"#13132a", border:"1px solid #525270", borderRadius:5, padding:"5px 8px", color:"#c0bdd8", fontFamily:"inherit", fontSize:11, cursor:"pointer" }}>✕</button>
    </div>
  );
}

// ─── Milestone Modal ──────────────────────────────────────────────────────────
function MilestoneModal({ onClose, onSave }) {
  const [name,     setName]     = useState("");
  const [deadline, setDeadline] = useState("");
  return (
    <Modal onClose={onClose} title="Add Milestone">
      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <Field label="Milestone Name">
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Launch MVP" style={inputStyle} autoFocus />
        </Field>
        <Field label="Deadline (optional)">
          <input type="date" value={deadline} onChange={e=>setDeadline(e.target.value)} style={inputStyle} />
        </Field>
        <button onClick={() => { if(!name.trim()) return; onSave({ name:name.trim(), deadline }); }}
          disabled={!name.trim()}
          style={{ background:name.trim()?"#f97316":"#13132a", border:"none", borderRadius:8, padding:"12px", color:"#fff", fontFamily:"inherit", fontSize:13, cursor:name.trim()?"pointer":"default", letterSpacing:"1px" }}>
          ADD MILESTONE
        </button>
      </div>
    </Modal>
  );
}

// ─── Task Modal ───────────────────────────────────────────────────────────────
function TaskModal({ onClose, onSave, colorOptions, initial, allTasks, goals }) {
  const [name,          setName]          = useState(initial?.name                      || "");
  const [duration,      setDuration]      = useState(initial?.duration                  || 30);
  const [startTime,     setStartTime]     = useState(initial?.startTime                 || "08:00");
  const [category,      setCategory]      = useState(initial?.category                  || "Work");
  const [color,         setColor]         = useState(initial?.color                     || colorOptions[0]);
  const [repType,       setRepType]       = useState(initial?.repeat?.type              || "daily");
  const [repDays,       setRepDays]       = useState(initial?.repeat?.days              || []);
  const [repDates,      setRepDates]      = useState(initial?.repeat?.dates             || []);
  const [linkedGoalId,  setLinkedGoalId]  = useState(initial?.linkedMilestone?.goalId   || "");
  const [linkedMsId,    setLinkedMsId]    = useState(initial?.linkedMilestone?.milestoneId || "");
  const [showLink,      setShowLink]      = useState(!!(initial?.linkedMilestone?.goalId));

  const selectedGoal        = (goals||[]).find(g => g.id === linkedGoalId);
  const availableMilestones = selectedGoal?.milestones || [];

  // Cascade preview
  const cascadePreview = (() => {
    if (!allTasks) return [];
    const draft   = { id:initial?.id||"__new__", name:name||"New Task", duration:Number(duration), startTime, color, category, repeat:{type:repType,days:repDays,dates:repDates} };
    const merged  = initial ? allTasks.map(t => t.id===initial.id ? draft : t) : [...allTasks, draft];
    const resolved = resolveOverlaps(merged);
    return resolved
      .filter(t => t.id !== draft.id)
      .filter(t => { const orig = allTasks.find(x=>x.id===t.id); return orig && orig.startTime !== t.startTime; })
      .map(t => ({ name:t.name, from:allTasks.find(x=>x.id===t.id)?.startTime, to:t.startTime }));
  })();

  const cats      = ["Work","Health","Learning","Personal","Creative","Social","Finance","Other"];
  const toggleDay  = d => setRepDays(p  => p.includes(d) ? p.filter(x=>x!==d) : [...p,d]);
  const toggleDate = d => setRepDates(p => p.includes(d) ? p.filter(x=>x!==d) : [...p,d]);
  const repeat     = repType==="daily" ? {type:"daily"} : repType==="weekdays" ? {type:"weekdays",days:repDays} : {type:"monthDates",dates:repDates};

  const linkedMilestone = linkedGoalId
    ? { goalId:linkedGoalId, milestoneId:linkedMsId||null }
    : null;

  const save = () => {
    if (!name.trim()) return;
    onSave({ id:initial?.id||"t"+Date.now(), name:name.trim(), duration:Number(duration), startTime, category, color, repeat, linkedMilestone });
  };

  return (
    <Modal onClose={onClose} title={initial ? "Edit Task" : "New Task"}>
      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>

        <Field label="Task Name">
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Morning Run" style={inputStyle} autoFocus />
        </Field>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          <Field label="Start Time">
            <input type="time" value={startTime} onChange={e=>setStartTime(e.target.value)} style={inputStyle} />
          </Field>
          <Field label={`Duration · ${fmtMins(Number(duration))}`}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:6 }}>
              <input type="range" min="5" max="240" step="5" value={duration} onChange={e=>setDuration(e.target.value)} style={{ flex:1, accentColor:color }} />
            </div>
          </Field>
        </div>

        <Field label="Category">
          <select value={category} onChange={e=>setCategory(e.target.value)} style={inputStyle}>
            {cats.map(c=><option key={c}>{c}</option>)}
          </select>
        </Field>

        <Field label="Color">
          <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
            {colorOptions.map(c=>(
              <div key={c} onClick={()=>setColor(c)}
                style={{ width:28, height:28, borderRadius:6, background:c, cursor:"pointer", border:color===c?"3px solid #fff":"3px solid transparent", transition:"all 0.13s" }} />
            ))}
          </div>
        </Field>

        {/* ── Repeat Schedule ── */}
        <Field label="Repeat">
          <div style={{ display:"flex", gap:6, marginBottom:10, flexWrap:"wrap" }}>
            {[["daily","Every Day"],["weekdays","Weekdays"],["monthDates","Month Dates"]].map(([v,l])=>(
              <button key={v} onClick={()=>setRepType(v)} className={`chip${repType===v?" on":""}`}>{l}</button>
            ))}
          </div>
          {repType==="weekdays" && (
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              {WEEKDAYS.map((d,i) => (
                <button key={i} onClick={()=>toggleDay(i)} className={`chip${repDays.includes(i)?" on":""}`}>{d}</button>
              ))}
            </div>
          )}
          {repType==="monthDates" && (
            <>
              <div style={{ fontSize:10, color:"#a0a0bc", marginBottom:8, letterSpacing:".5px" }}>Select dates of the month to repeat on:</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                {MONTH_DATES.map(d => (
                  <button key={d} onClick={()=>toggleDate(d)} className={`dchip${repDates.includes(d)?" on":""}`}>{d}</button>
                ))}
              </div>
            </>
          )}
        </Field>

        {/* ── Goal / Milestone Link ── */}
        <div style={{ borderTop:"1px solid #181830", paddingTop:14 }}>
          {/* Toggle button */}
          <button onClick={() => { setShowLink(v=>!v); if(showLink){ setLinkedGoalId(""); setLinkedMsId(""); } }}
            style={{ display:"flex", alignItems:"center", gap:7, background:"none", border:"none", cursor:"pointer", color:showLink?"#f97316":"#b0b0c8", fontFamily:"inherit", fontSize:12, padding:0, letterSpacing:".5px", width:"100%" }}>
            <Icon name="link" size={13} />
            {showLink ? "Remove Goal Link" : "Link to Goal Milestone"}
            <span style={{ marginLeft:"auto", fontSize:14, opacity:.5, lineHeight:1 }}>{showLink?"×":"+"}</span>
          </button>

          {showLink && (
            <div style={{ marginTop:12, display:"flex", flexDirection:"column", gap:0 }}>

              {/* ── No goals state ── */}
              {(goals||[]).length === 0 && (
                <div style={{ fontSize:12, color:"#a0a0bc", background:"#13132a", borderRadius:8, padding:"11px 13px" }}>
                  No goals yet. Create a goal first, then link tasks to milestones.
                </div>
              )}

              {/* ── Goal not yet chosen → show goal picker cards ── */}
              {(goals||[]).length > 0 && !linkedGoalId && (
                <>
                  <div style={{ fontSize:10, letterSpacing:"1.5px", color:"#a0a0bc", marginBottom:8, textTransform:"uppercase" }}>Select Goal</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                    {(goals||[]).map(g => {
                      const catColors = { Health:"#10b981", Career:"#3b82f6", Learning:"#a855f7", Finance:"#eab308", Personal:"#f43f5e", Other:"#f97316" };
                      const gc = catColors[g.category] || "#f97316";
                      const ms = g.milestones || [];
                      return (
                        <div key={g.id} onClick={() => { setLinkedGoalId(g.id); setLinkedMsId(""); }}
                          style={{ background:"#13132a", border:"1px solid #525270", borderRadius:9, padding:"11px 13px", cursor:"pointer", transition:"border-color 0.15s" }}
                          onMouseEnter={e=>e.currentTarget.style.borderColor="#f9731660"}
                          onMouseLeave={e=>e.currentTarget.style.borderColor="#525270"}>
                          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                            <span style={{ fontSize:13, color:"#e8e6f0", fontWeight:500 }}>{g.name}</span>
                            <span style={{ fontSize:10, background:gc+"22", color:gc, padding:"2px 7px", borderRadius:4, letterSpacing:"1px" }}>{g.category}</span>
                          </div>
                          <div style={{ fontSize:11, color:"#a0a0bc", marginTop:5, display:"flex", gap:10 }}>
                            {ms.length > 0 && <span style={{ display:"flex", alignItems:"center", gap:4 }}><Icon name="milestone" size={10}/> {ms.filter(m=>m.done).length}/{ms.length} milestones</span>}
                            {g.deadline && <span>Due {fmtDate(g.deadline)}</span>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </>
              )}

              {/* ── Goal chosen → locked header + milestone picker ── */}
              {linkedGoalId && selectedGoal && (
                <>
                  {/* Locked goal card */}
                  <div style={{ background:"#f9731610", border:"1px solid #f9731644", borderRadius:9, padding:"11px 14px", marginBottom:12 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <Icon name="flag" size={12} />
                        <span style={{ fontSize:13, color:"#f97316", fontWeight:500 }}>{selectedGoal.name}</span>
                      </div>
                      <button onClick={() => { setLinkedGoalId(""); setLinkedMsId(""); }}
                        style={{ background:"none", border:"none", cursor:"pointer", color:"#b0b0c8", fontSize:11, fontFamily:"inherit", display:"flex", alignItems:"center", gap:4, padding:0 }}>
                        <Icon name="close" size={11}/> change
                      </button>
                    </div>
                    {selectedGoal.deadline && (
                      <div style={{ fontSize:10, color:"#b0b0c8", marginTop:4, paddingLeft:20 }}>Due {fmtDate(selectedGoal.deadline)}</div>
                    )}
                  </div>

                  {/* Milestone picker */}
                  <div style={{ fontSize:10, letterSpacing:"1.5px", color:"#a0a0bc", marginBottom:8, textTransform:"uppercase" }}>Link to Milestone</div>

                  {availableMilestones.length === 0 ? (
                    <div style={{ fontSize:12, color:"#a0a0bc", background:"#13132a", border:"1px solid #1e1e38", borderRadius:8, padding:"11px 13px", lineHeight:1.6 }}>
                      This goal has no milestones yet.<br/>
                      <span style={{ color:"#b0b0c8" }}>Completing this task will still count as +1 toward the goal.</span>
                    </div>
                  ) : (
                    <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                      {availableMilestones.map(m => {
                        const isSel = linkedMsId === m.id;
                        return (
                          <div key={m.id} onClick={() => setLinkedMsId(isSel ? "" : m.id)}
                            style={{ display:"flex", alignItems:"center", gap:10, background: isSel?"#f9731614":"#13132a", border:`1px solid ${isSel?"#f9731650":"#1e1e38"}`, borderRadius:8, padding:"10px 13px", cursor: m.done?"default":"pointer", opacity:m.done?0.45:1, transition:"all 0.15s" }}>
                            {/* Radio dot */}
                            <div style={{ width:16, height:16, borderRadius:"50%", border:`2px solid ${isSel?"#f97316":"#a0a0bc"}`, background:isSel?"#f97316":"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"all 0.15s" }}>
                              {isSel && <div style={{ width:6, height:6, borderRadius:"50%", background:"#fff" }} />}
                            </div>
                            <div style={{ flex:1, minWidth:0 }}>
                              <div style={{ fontSize:13, color: m.done?"#a0a0bc":isSel?"#f97316":"#d8d6e8", fontWeight: isSel?500:400, textDecoration:m.done?"line-through":"none" }}>
                                {m.name}
                              </div>
                              {m.deadline && (
                                <div style={{ fontSize:10, color:"#a0a0bc", marginTop:2, display:"flex", alignItems:"center", gap:4 }}>
                                  <Icon name="calendar" size={9}/> {fmtDate(m.deadline)}
                                </div>
                              )}
                            </div>
                            {m.done && <span style={{ fontSize:10, color:"#10b981", flexShrink:0 }}>✓ Done</span>}
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {/* Confirmation hint */}
                  <div style={{ marginTop:10, background:"#0d1a0d", border:"1px solid #10b98133", borderRadius:7, padding:"9px 12px", fontSize:11, color:"#10b981", lineHeight:1.6 }}>
                    ✦ {linkedMsId
                      ? `Completing this task will mark "${availableMilestones.find(m=>m.id===linkedMsId)?.name}" as done and update the goal progress.`
                      : "Completing this task will count as +1 toward the goal progress."}
                  </div>
                </>
              )}
            </div>
          )}
        </div>

        <button onClick={save} disabled={!name.trim()}
          style={{ background:name.trim()?"#f97316":"#13132a", border:"none", borderRadius:8, padding:"12px", color:"#fff", fontFamily:"inherit", fontSize:13, cursor:name.trim()?"pointer":"default", letterSpacing:"1px", marginTop:4 }}>
          {initial ? "SAVE CHANGES" : "ADD TASK"}
        </button>

        {cascadePreview.length > 0 && (
          <div style={{ background:"#1a1205", border:"1px solid #f97316a0", borderRadius:8, padding:"10px 13px" }}>
            <div style={{ fontSize:10, color:"#f97316", letterSpacing:"1.5px", textTransform:"uppercase", marginBottom:7 }}>⏱ Auto-cascade will shift:</div>
            {cascadePreview.map((c,i) => (
              <div key={i} style={{ fontSize:11, color:"#c09060", marginBottom:3 }}>
                <span style={{ color:"#e8c080" }}>{c.name}</span> {fmt12(c.from)} → <span style={{ color:"#f97316" }}>{fmt12(c.to)}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </Modal>
  );
}

// ─── Day Timeline ─────────────────────────────────────────────────────────────
function DayTimeline({ tasks, nowMins }) {
  const S = 5*60, E = 24*60, R = E-S;
  const pct  = m => Math.max(0,Math.min(100,(m-S)/R*100));
  const hrs  = [6,9,12,15,18,21];
  const lbl  = h => h>12?`${h-12}pm`:h===12?"12pm":`${h}am`;

  return (
    <div style={{ background:"#0d0d1e", border:"1px solid #181830", borderRadius:10, padding:"12px 14px 16px", marginBottom:16 }}>
      <div style={{ fontSize:10, letterSpacing:"2px", color:"#a0a0bc", marginBottom:10, textTransform:"uppercase" }}>Day Timeline</div>

      {/* Track */}
      <div style={{ position:"relative", height:32, background:"#13132a", borderRadius:6, overflow:"hidden" }}>

        {/* Task blocks */}
        {tasks.map(task => {
          const tm = t2m(task.startTime||"00:00");
          const left = pct(tm);
          const width = Math.max(0.8, task.duration/R*100);
          if (left>=100 || tm<S) return null;
          return (
            <div key={task.id}
              title={`${task.name}  ${fmt12(task.startTime)} – ${fmt12(endTime(task.startTime,task.duration))}  (${fmtMins(task.duration)})`}
              style={{ position:"absolute", left:`${left}%`, width:`${Math.min(width,100-left)}%`, top:4, height:24, background:task.color, borderRadius:3, opacity:.82, display:"flex", alignItems:"center", overflow:"hidden" }}>
              <span style={{ fontSize:9, color:"rgba(255,255,255,.7)", padding:"0 4px", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                {task.name}
              </span>
            </div>
          );
        })}

        {/* Now line */}
        {nowMins>=S && nowMins<=E && (
          <div style={{ position:"absolute", left:`${pct(nowMins)}%`, top:0, bottom:0, width:2, background:"#fff", opacity:.9, zIndex:10 }}>
            <div style={{ position:"absolute", top:-1, left:-3, width:8, height:8, borderRadius:"50%", background:"#fff" }} />
          </div>
        )}
      </div>

      {/* Hour labels */}
      <div style={{ position:"relative", height:14, marginTop:4 }}>
        {hrs.map(h => {
          const p = pct(h*60);
          if (p<0||p>100) return null;
          return (
            <div key={h} style={{ position:"absolute", left:`${p}%`, transform:"translateX(-50%)", fontSize:9, color:"#6e6e8a", letterSpacing:".3px" }}>{lbl(h)}</div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Goal Modal ───────────────────────────────────────────────────────────────
function GoalModal({ onClose, onSave }) {
  const [name,     setName]     = useState("");
  const [target,   setTarget]   = useState(100);
  const [unit,     setUnit]     = useState("sessions");
  const [category, setCategory] = useState("Personal");
  const [deadline, setDeadline] = useState("");
  const [notes,    setNotes]    = useState("");
  const cats = ["Health","Career","Learning","Finance","Personal","Other"];

  return (
    <Modal onClose={onClose} title="New Goal">
      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <Field label="Goal Name"><input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Read 24 books" style={inputStyle} autoFocus /></Field>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          <Field label="Target"><input type="number" value={target} onChange={e=>setTarget(e.target.value)} style={inputStyle} min="1" /></Field>
          <Field label="Unit"><input value={unit} onChange={e=>setUnit(e.target.value)} placeholder="sessions, km…" style={inputStyle} /></Field>
        </div>
        <Field label="Category">
          <select value={category} onChange={e=>setCategory(e.target.value)} style={inputStyle}>
            {cats.map(c=><option key={c}>{c}</option>)}
          </select>
        </Field>
        <Field label="Deadline (optional)"><input type="date" value={deadline} onChange={e=>setDeadline(e.target.value)} style={inputStyle} /></Field>
        <Field label="Notes (optional)"><textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="What does achieving this mean to you?" style={{ ...inputStyle, minHeight:70, resize:"vertical" }} /></Field>
        <button onClick={() => { if(!name.trim()) return; onSave({ id:"g"+Date.now(), name:name.trim(), target:Number(target), current:0, unit, category, deadline, notes, milestones:[] }); }}
          disabled={!name.trim()}
          style={{ background:name.trim()?"#f97316":"#13132a", border:"none", borderRadius:8, padding:"12px", color:"#fff", fontFamily:"inherit", fontSize:13, cursor:name.trim()?"pointer":"default", letterSpacing:"1px", marginTop:4 }}>
          CREATE GOAL
        </button>
      </div>
    </Modal>
  );
}

// ─── Shared ───────────────────────────────────────────────────────────────────
function Modal({ onClose, title, children }) {
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.78)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:500, padding:16 }} onClick={onClose}>
      <div style={{ background:"#0b0b18", border:"1px solid #525270", borderRadius:14, padding:24, width:"100%", maxWidth:440, maxHeight:"90vh", overflowY:"auto" }} onClick={e=>e.stopPropagation()}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
          <div style={{ fontFamily:"'Syne',sans-serif", fontSize:18, fontWeight:700, color:"#fff" }}>{title}</div>
          <button onClick={onClose} style={{ background:"none", border:"none", cursor:"pointer", color:"#a0a0bc", padding:4, display:"flex" }}><Icon name="close" size={18} /></button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <div style={{ fontSize:10, letterSpacing:"1.5px", color:"#a0a0bc", marginBottom:6, textTransform:"uppercase" }}>{label}</div>
      {children}
    </div>
  );
}

const inputStyle = {
  width:"100%", background:"#13132a", border:"1px solid #525270", borderRadius:7,
  padding:"10px 12px", color:"#e8e6f0", fontSize:13, outline:"none", fontFamily:"'DM Mono',monospace"
};

    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
