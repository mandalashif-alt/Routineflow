          caches.open(CACHE).then(c => c.addAll([self.location.href])).then(() => self.skipWaiting())

          caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))))

        ));
        self.addEventListener('fetch', e => {

          e.respondWith(
            caches.match(e.request).then(cached => cached || fetch(e.request).then(res => {

// ─── Firestore Storage ────────────────────────────────────────────────────────
let _currentUid = null;

const store = {
  setUid(uid) { _currentUid = uid; },
  async get(key) {
    try {
      if (_currentUid && window._db) {
        const doc = await window._db.collection('users').doc(_currentUid).get();
        if (doc.exists) {
          const val = doc.data()[key];
          return val !== undefined ? val : null;
        }
        return null;
      }
      // Fallback: localStorage (preview / offline)
      const v = localStorage.getItem(key);
      return v ? JSON.parse(v) : null;
    } catch { return null; }
  },
  async set(key, val) {
    try {
      if (_currentUid && window._db) {
        await window._db.collection('users').doc(_currentUid).set(
          { [key]: val }, { merge: true }
        );
        return;
      }
      localStorage.setItem(key, JSON.stringify(val));
    } catch {}
  }
};

// ─── Time Helpers ─────────────────────────────────────────────────────────────
const t2m      = t => { const [h,m]=(t||"00:00").split(":").map(Number); return h*60+m; };
const addMins  = (t,m) => { const tot=(t2m(t)+m+1440)%1440; return `${String(Math.floor(tot/60)).padStart(2,"0")}:${String(tot%60).padStart(2,"0")}`; };
const fmt12    = t => { if(!t)return""; const [h,m]=t.split(":").map(Number); return `${h%12||12}:${String(m).padStart(2,"0")} ${h>=12?"PM":"AM"}`; };
const endTime  = (start,dur) => addMins(start,dur);

// Auto-cascade: after any task change, push subsequent tasks that would overlap
const resolveOverlaps = tasks => {
  const s = [...tasks].sort((a,b) => t2m(a.startTime||"00:00") - t2m(b.startTime||"00:00"));
  for (let i = 0; i < s.length - 1; i++) {
    const end = t2m(s[i].startTime||"00:00") + s[i].duration;
    if (end > t2m(s[i+1].startTime||"00:00"))
      s[i+1] = { ...s[i+1], startTime: addMins(s[i].startTime||"00:00", s[i].duration) };
  }
  return tasks.map(t => s.find(x => x.id===t.id) || t);
};

const taskAppliesToDate = (task, dateStr) => {
  if (!task.repeat || task.repeat.type === "daily") return true;
  const d = new Date(dateStr + "T12:00:00");
  if (task.repeat.type === "weekdays")   return task.repeat.days?.includes(d.getDay()) ?? false;
  if (task.repeat.type === "monthDates") return task.repeat.dates?.includes(d.getDate()) ?? false;

};

// ─── Live Clock ───────────────────────────────────────────────────────────────
function useClock(tz) {
  const [time, setTime] = useState("");
  useEffect(() => {
    const tick = () => setTime(new Date().toLocaleTimeString("en-GB", { timeZone:tz, hour:"2-digit", minute:"2-digit", second:"2-digit" }));
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [tz]);
  return time;
}

// ─── Notification Engine ──────────────────────────────────────────────────────
const RFNotify = {
  _timers: [],

  // Request permission — must be called from user gesture
  async requestPermission() {
    if (!('Notification' in window)) return 'unsupported';
    if (Notification.permission === 'granted') return 'granted';
    if (Notification.permission === 'denied')  return 'denied';
    const result = await Notification.requestPermission();
    return result;
  },

  // Show a notification — via SW if available, fallback to direct API
  async show(title, body, tag) {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    try {
      const sw = window._swReg || (navigator.serviceWorker && await navigator.serviceWorker.ready);
      if (sw && sw.active) {
        sw.active.postMessage({ type:'SHOW_NOTIFICATION', title, body, tag });
      } else {
        new Notification(title, { body, tag, icon: '' });
      }
    } catch(e) {
      try { new Notification(title, { body, tag }); } catch {}
    }
  },

  // Clear all scheduled timers
  clearAll() {
    this._timers.forEach(id => clearTimeout(id));
    this._timers = [];
  },

  // Schedule notifications for today's tasks
  scheduleTasks(tasks, timezone, settings) {
    this.clearAll();
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    if (!settings.enabled) return;

    const now  = new Date();
    const todayStr = now.toLocaleDateString('en-CA', { timeZone: timezone });

    tasks.forEach(task => {
      if (!task.startTime) return;
      const [h, m] = task.startTime.split(':').map(Number);

      // Build a Date for today's task start
      const taskDate = new Date(todayStr + 'T' + task.startTime + ':00');
      const taskEndMs = taskDate.getTime() + (task.duration || 30) * 60000;
      const msUntilStart = taskDate - now;
      const msUntilEnd   = taskEndMs - now;

      // 5-min warning
      if (settings.fiveMin && msUntilStart > 5 * 60000) {
        const id = setTimeout(() => {
          this.show(
            `⏰ Starting in 5 minutes`,
            `${task.name} — ${task.startTime}`,
            `rf-warn-${task.id}`
          );
        }, msUntilStart - 5 * 60000);
        this._timers.push(id);
      }

      // At start
      if (settings.onStart && msUntilStart > 0) {
        const id = setTimeout(() => {
          this.show(
            `▶ Task starting now`,
            `${task.name}`,
            `rf-start-${task.id}`
          );
        }, msUntilStart);
        this._timers.push(id);
      }

      // At end
      if (settings.onEnd && msUntilEnd > 0) {
        const id = setTimeout(() => {
          this.show(
            `✓ Task complete`,
            `${task.name} finished`,
            `rf-end-${task.id}`
          );
        }, msUntilEnd);
        this._timers.push(id);
      }
    });
  }
};

function NotifBanner({ onGranted, onDismiss }) {
  const [loading, setLoading] = useState(false);
  const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;

  const handleEnable = async () => {
    setLoading(true);
    const result = await RFNotify.requestPermission();
    setLoading(false);
    if (result === 'granted') onGranted();
    else if (result === 'denied') onDismiss();
  };

  if (isIos && !isStandalone) {
    return (
      <div style={{ margin:"0 0 14px", background:"#1a1a0a", border:"1px solid #f9731644", borderRadius:10, padding:"13px 16px" }}>

}

        <div style={{ fontSize:13, color:"#e8e6f0" }}>{label}</div>
        {sublabel && <div style={{ fontSize:11, color:"#6e6e8a", marginTop:2 }}>{sublabel}</div>}
      </div>
      <div onClick={disabled ? null : onToggle}
        style={{ width:44, height:26, borderRadius:13, background:value?"#10b981":"#252540", position:"relative", cursor:disabled?"not-allowed":"pointer", transition:"background 0.2s", flexShrink:0 }}>
        <div style={{ position:"absolute", top:3, left:value?20:3, width:20, height:20, borderRadius:"50%", background:"#fff", transition:"left 0.2s", boxShadow:"0 1px 4px rgba(0,0,0,.5)" }} />
      </div>
    </div>
  );

  const handleTest = async () => {
    setTesting(true);
    await RFNotify.show("🔔 RoutineFlow test", "Notifications are working correctly!", "rf-test");
    setTimeout(() => setTesting(false), 2000);
  };

  // Next scheduled task
  const now = new Date();
  const todayStr = now.toLocaleDateString('en-CA', { timeZone: timezone });
  const upcoming = (tasks || [])
    .filter(t => t.startTime && taskAppliesToDate(t, todayStr))
    .map(t => {
      const [h, m] = t.startTime.split(':').map(Number);
      const ms = new Date(todayStr + 'T' + t.startTime + ':00') - now;
      return { ...t, ms };
    })
    .filter(t => t.ms > 0)
    .sort((a, b) => a.ms - b.ms)[0];

  const fmtCountdown = ms => {
    const totalMins = Math.ceil(ms / 60000);
    if (totalMins < 60) return `${totalMins}m`;
    return `${Math.floor(totalMins/60)}h ${totalMins%60}m`;
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.75)", zIndex:1000, display:"flex", alignItems:"flex-end" }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ width:"100%", background:"#0e0e1d", borderRadius:"18px 18px 0 0", padding:"20px 18px 32px", maxHeight:"85vh", overflowY:"auto" }}>

        {/* Header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
          <div style={{ fontFamily:"'Syne',sans-serif", fontSize:17, fontWeight:700, color:"#fff" }}>🔔 Notifications</div>
          <button onClick={onClose} style={{ background:"none", border:"none", color:"#6e6e8a", fontSize:20, cursor:"pointer", padding:4, lineHeight:1 }}>✕</button>
        </div>

        {/* Next task chip */}
        {upcoming && settings.enabled && (
          <div style={{ background:"#0d1a0d", border:"1px solid #10b98133", borderRadius:8, padding:"9px 13px", marginBottom:14, display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontSize:18 }}>⏰</span>
            <div>
              <div style={{ fontSize:12, color:"#10b981", fontWeight:600 }}>Next alert in {fmtCountdown(upcoming.ms)}</div>
              <div style={{ fontSize:11, color:"#6e6e8a", marginTop:1 }}>{upcoming.name} — {fmt12(upcoming.startTime)}</div>
            </div>
          </div>
        )}

        {/* iOS install warning */}
        {isIos && !isStandalone && (
          <div style={{ background:"#1a1208", border:"1px solid #f9731644", borderRadius:8, padding:"10px 13px", marginBottom:14 }}>
            <div style={{ fontSize:12, color:"#f97316", fontWeight:600, marginBottom:4 }}>📲 Install app to receive notifications</div>
            <div style={{ fontSize:11, color:"#a0a0bc", lineHeight:1.6 }}>
              Tap <b style={{color:"#fff"}}>Share ↑</b> in Safari → <b style={{color:"#fff"}}>Add to Home Screen</b> → reopen app from home screen, then grant permission.
            </div>
          </div>
        )}

        {/* Toggles */}
        <Toggle label="Notifications enabled" sublabel="Master switch for all task alerts"
          value={settings.enabled} onToggle={() => onChange({...settings, enabled:!settings.enabled})} />
        <Toggle label="5-minute warning" sublabel="Get alerted 5 mins before a task starts"
          value={settings.fiveMin} onToggle={() => onChange({...settings, fiveMin:!settings.fiveMin})}
          disabled={!settings.enabled} />
        <Toggle label="Task starts" sublabel="Alert exactly when a task begins"
          value={settings.onStart} onToggle={() => onChange({...settings, onStart:!settings.onStart})}
          disabled={!settings.enabled} />
        <Toggle label="Task ends" sublabel="Alert when a task's duration is complete"
          value={settings.onEnd} onToggle={() => onChange({...settings, onEnd:!settings.onEnd})}
          disabled={!settings.enabled} />

        {/* Test + Save buttons */}
        <div style={{ display:"flex", gap:8, marginTop:18 }}>
          <button onClick={handleTest}
            style={{ flex:1, background:"#131328", border:"1px solid #252545", borderRadius:9, padding:"11px", color:"#a0a0bc", fontSize:12, fontFamily:"inherit", cursor:"pointer", fontWeight:500 }}>
            {testing ? "✓ Sent!" : "🔔 Test notification"}
          </button>
          <button onClick={onClose}
            style={{ flex:2, background:"#f97316", border:"none", borderRadius:9, padding:"11px", color:"#fff", fontSize:13, fontFamily:"inherit", cursor:"pointer", fontWeight:600 }}>
            Done
          </button>
        </div>

        <div style={{ marginTop:14, fontSize:10, color:"#525270", lineHeight:1.7, textAlign:"center" }}>
          Notifications fire at task start times using your device clock.<br/>
          {isIos ? "iPhone requires iOS 16.4+ and app installed to Home Screen." : "Works in all browsers that support the Notifications API."}
        </div>
      </div>
    </div>
  );
}

// ─── Auth Screen (Firebase) ───────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [mode,    setMode]    = useState("login");
  const [name,    setName]    = useState("");
  const [email,   setEmail]   = useState("");
  const [pass,    setPass]    = useState("");
  const [confirm, setConfirm] = useState("");
  const [error,   setError]   = useState("");
  const [loading, setLoading] = useState(false);
  const [showPw,  setShowPw]  = useState(false);

  const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

  // ── Google Sign-In ──────────────────────────────────────────────────────────
  const handleGoogle = async () => {
    setError(""); setLoading(true);
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const result   = await window._auth.signInWithPopup(provider);
      const fbUser   = result.user;
      // onAuthStateChanged in App will handle the rest
    } catch (e) {
      if (e.code === "auth/preview-mode") {
        setError("⚠️ Firebase only works when hosted online (GitHub Pages). This preview cannot connect to Firebase. Upload the file to GitHub Pages and it will work fully.");
      } else if (e.code === "auth/popup-closed-by-user") {
        setError("Sign-in popup was closed. Please try again.");
      } else if (e.code === "auth/configuration-not-found" || e.code === "auth/invalid-api-key") {
        setError("Firebase is not configured yet. Please paste your Firebase config into the HTML file first. See setup instructions below.");
      } else {
        setError(e.message || "Google sign-in failed. Please try again.");
      }
    }
    setLoading(false);
  };

  // ── Email / Password ────────────────────────────────────────────────────────
  const handleSubmit = async () => {
    setError("");
    if (!emailValid)        return setError("Please enter a valid email address.");
    if (pass.length < 6)    return setError("Password must be at least 6 characters.");
    if (mode === "signup") {
      if (!name.trim())     return setError("Please enter your name.");
      if (pass !== confirm) return setError("Passwords do not match.");
    }
    setLoading(true);
    try {
      if (mode === "signup") {
        const cred = await window._auth.createUserWithEmailAndPassword(email.trim(), pass);
        await cred.user.updateProfile({ displayName: name.trim() });
        // onAuthStateChanged in App picks this up automatically
      } else {
        await window._auth.signInWithEmailAndPassword(email.trim(), pass);
      }
    } catch (e) {
      if (e.code === "auth/email-already-in-use")    setError("An account with this email already exists. Please sign in.");
      else if (e.code === "auth/user-not-found")     setError("No account found with this email. Please sign up.");
      else if (e.code === "auth/wrong-password")     setError("Incorrect password. Please try again.");
      else if (e.code === "auth/invalid-credential") setError("Incorrect email or password. Please try again.");
      else if (e.code === "auth/configuration-not-found" || e.code === "auth/invalid-api-key")
        setError("Firebase is not configured yet. Please paste your Firebase config into the HTML file. See the setup guide.");
      else setError(e.message || "Something went wrong. Please try again.");
    }
    setLoading(false);
  };

  const inputStyle = {
    width:"100%", background:"#0f0f1e", border:"1px solid #242444", borderRadius:9,
    padding:"13px 15px", color:"#fff", fontSize:14, fontFamily:"'DM Mono',monospace",
    outline:"none", boxSizing:"border-box", transition:"border-color 0.2s"
  };

  return (
    <div style={{ minHeight:"100vh", background:"#080810", display:"flex", alignItems:"center", justifyContent:"center", padding:20, fontFamily:"'DM Mono',monospace" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400;500&display=swap');
        .auth-input:focus { border-color:#f97316!important; }
        .auth-btn-google:hover { background:#1a1a2e!important; border-color:#4285F4!important; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
        .auth-card { animation: fadeUp 0.45s ease; }
      `}</style>

      <div className="auth-card" style={{ width:"100%", maxWidth:420 }}>
        {/* Logo */}
        <div style={{ textAlign:"center", marginBottom:36 }}>
          <div style={{ fontFamily:"'Syne',sans-serif", fontSize:26, fontWeight:800, letterSpacing:"-0.5px", color:"#fff", marginBottom:6 }}>ROUTINEFLOW</div>
          <div style={{ fontSize:11, color:"#6e6e8a", letterSpacing:"2px", textTransform:"uppercase" }}>Build your best day, every day</div>
        </div>

        {/* Card */}
        <div style={{ background:"#0e0e1d", border:"1px solid #1e1e38", borderRadius:16, padding:"32px 28px" }}>

          {/* Mode toggle */}
          <div style={{ display:"flex", background:"#0a0a18", borderRadius:10, padding:4, marginBottom:24, border:"1px solid #1a1a30" }}>
            {["login","signup"].map(m => (
              <button key={m} onClick={() => { setMode(m); setError(""); }}
                style={{ flex:1, padding:"9px", border:"none", borderRadius:7, cursor:"pointer", fontFamily:"inherit", fontSize:12, letterSpacing:"1px", textTransform:"uppercase", fontWeight:500, background:mode===m?"#f97316":"transparent", color:mode===m?"#fff":"#6e6e8a", transition:"all 0.2s" }}>
                {m === "login" ? "Sign In" : "Sign Up"}
              </button>
            ))}
          </div>

          {/* ── Google Sign-In button ── */}
          <button className="auth-btn-google" onClick={handleGoogle} disabled={loading}
            style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"center", gap:10, background:"#ffffff", border:"2px solid #dadce0", borderRadius:9, padding:"12px 16px", color:"#3c4043", fontSize:14, fontFamily:"inherit", cursor:"pointer", marginBottom:18, transition:"all 0.2s", fontWeight:500 }}>
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            {loading ? "Connecting…" : "Continue with Google"}
          </button>

          {/* Divider */}
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:18 }}>
            <div style={{ flex:1, height:1, background:"#1a1a30" }} />
            <span style={{ fontSize:11, color:"#525270", letterSpacing:"1px" }}>OR</span>
            <div style={{ flex:1, height:1, background:"#1a1a30" }} />
          </div>

          {/* Fields */}
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            {mode === "signup" && (
              <div>
                <div style={{ fontSize:10, color:"#a0a0bc", letterSpacing:"1.5px", textTransform:"uppercase", marginBottom:6 }}>Full Name</div>
                <input className="auth-input" style={inputStyle} type="text" placeholder="Your name"
                  value={name} onChange={e => setName(e.target.value)}
                  onKeyDown={e => e.key==="Enter" && handleSubmit()} />
              </div>
            )}
            <div>
              <div style={{ fontSize:10, color:"#a0a0bc", letterSpacing:"1.5px", textTransform:"uppercase", marginBottom:6 }}>Email</div>
              <input className="auth-input" style={inputStyle} type="email" placeholder="you@example.com"
                value={email} onChange={e => setEmail(e.target.value)}
                onKeyDown={e => e.key==="Enter" && handleSubmit()} />
            </div>
            <div>
              <div style={{ fontSize:10, color:"#a0a0bc", letterSpacing:"1.5px", textTransform:"uppercase", marginBottom:6 }}>Password</div>
              <div style={{ position:"relative" }}>
                <input className="auth-input" style={inputStyle} type={showPw?"text":"password"} placeholder="Min. 6 characters"
                  value={pass} onChange={e => setPass(e.target.value)}
                  onKeyDown={e => e.key==="Enter" && handleSubmit()} />
                <button onClick={() => setShowPw(o=>!o)}
                  style={{ position:"absolute", right:13, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"#6e6e8a", cursor:"pointer", fontSize:11, fontFamily:"inherit" }}>
                  {showPw ? "HIDE" : "SHOW"}
                </button>
              </div>
            </div>
            {mode === "signup" && (
              <div>
                <div style={{ fontSize:10, color:"#a0a0bc", letterSpacing:"1.5px", textTransform:"uppercase", marginBottom:6 }}>Confirm Password</div>
                <input className="auth-input" style={inputStyle} type={showPw?"text":"password"} placeholder="Repeat password"
                  value={confirm} onChange={e => setConfirm(e.target.value)}
                  onKeyDown={e => e.key==="Enter" && handleSubmit()} />
              </div>
            )}
          </div>

          {/* Error */}
          {error && (
            <div style={{ background:"#1a080a", border:"1px solid #f43f5e44", borderRadius:8, padding:"10px 13px", marginTop:14, fontSize:12, color:"#f87090", lineHeight:1.6 }}>
              {error}
            </div>
          )}

          {/* Submit */}
          <button onClick={handleSubmit} disabled={loading}
            style={{ width:"100%", marginTop:18, padding:"13px", background:loading?"#7a3a10":"#f97316", border:"none", borderRadius:9, color:"#fff", fontSize:13, fontFamily:"inherit", fontWeight:500, letterSpacing:"1px", cursor:loading?"not-allowed":"pointer", transition:"background 0.2s", textTransform:"uppercase" }}>
            {loading ? "Please wait…" : mode === "login" ? "Sign In →" : "Create Account →"}
          </button>

          {/* Switch mode */}
          <div style={{ textAlign:"center", marginTop:18, fontSize:12, color:"#6e6e8a" }}>
            {mode === "login"
              ? <>Don't have an account? <span onClick={() => { setMode("signup"); setError(""); }} style={{ color:"#f97316", cursor:"pointer" }}>Sign up free</span></>
              : <>Already have an account? <span onClick={() => { setMode("login"); setError(""); }} style={{ color:"#f97316", cursor:"pointer" }}>Sign in</span></>
            }
          </div>
        </div>

        <div style={{ textAlign:"center", marginTop:20, fontSize:10, color:"#525270", lineHeight:1.7 }}>
          {window._firebaseReady
            ? "Secured by Firebase · Data synced across all your devices"
            : "⚠️ Preview mode — Firebase requires GitHub Pages to work. Upload to GitHub Pages for full functionality."}
        </div>
      </div>
    </div>
  );
}

// ─── App Root ─────────────────────────────────────────────────────────────────
function App() {
  const [tab,          setTab]          = useState("today");
  const [tasks,        setTasks]        = useState(DEFAULT_TASKS);
  const [logs,         setLogs]         = useState({});
  const [goals,        setGoals]        = useState([]);
  const [timezone,     setTimezone]     = useState("Europe/Berlin");
  const [modal,        setModal]        = useState(null);
  const [editTask,     setEditTask]     = useState(null);
  const [loaded,       setLoaded]       = useState(false);
  const [tzOpen,       setTzOpen]       = useState(false);
  const [selectedDate, setSelectedDate] = useState(null);
  const [user,         setUser]         = useState(null);
  const [authChecked,  setAuthChecked]  = useState(false);
  const clock = useClock(timezone);

  const [syncReady, setSyncReady] = useState(false);

  // ── Notification state ───────────────────────────────────────────────────────
  const defaultNotifSettings = { enabled:true, fiveMin:true, onStart:true, onEnd:false };
  const [notifPermission,  setNotifPermission]  = useState(() => typeof Notification !== 'undefined' ? Notification.permission : 'unsupported');
  const [notifSettings,    setNotifSettings]    = useState(() => {
    try { return JSON.parse(localStorage.getItem('rf_notif_settings')) || defaultNotifSettings; } catch { return defaultNotifSettings; }
  });
  const [showNotifBanner,  setShowNotifBanner]  = useState(false);
  const [showNotifPanel,   setShowNotifPanel]   = useState(false);

  // Show permission banner after login if not yet decided
  useEffect(() => {
    if (user && notifPermission === 'default') {
      const dismissed = localStorage.getItem('rf_notif_dismissed');
      if (!dismissed) setTimeout(() => setShowNotifBanner(true), 2000);
    }
  }, [user]);

  // Save settings to localStorage
  useEffect(() => {
    localStorage.setItem('rf_notif_settings', JSON.stringify(notifSettings));
  }, [notifSettings]);

  // tkey must be defined before the scheduling useEffect below
  const tkey = todayKey(timezone);

  // Re-schedule whenever tasks, timezone or settings change
  useEffect(() => {
    if (!user || !syncReady) return;
    const todayTasks2 = tasks.filter(t => taskAppliesToDate(t, tkey));
    RFNotify.scheduleTasks(todayTasks2, timezone, notifSettings);
    return () => RFNotify.clearAll();
  }, [tasks, timezone, notifSettings, user, syncReady]);

  // ── Firebase Auth state listener ────────────────────────────────────────────
  useEffect(() => {
    const unsubscribe = window._auth.onAuthStateChanged(async (fbUser) => {
      setSyncReady(false); // block saves during load
      if (fbUser) {
        const displayName = fbUser.displayName || fbUser.email.split("@")[0];
        setUser({ name: displayName, email: fbUser.email, uid: fbUser.uid });
        store.setUid(fbUser.uid);

        // Load all user data from Firestore
        let t, l, g, tz;
        try {
          [t, l, g, tz] = await Promise.all([
            store.get("rf_tasks"),
            store.get("rf_logs"),
            store.get("rf_goals"),
            store.get("rf_tz"),
          ]);
        } catch(e) {
          console.warn("Firestore read failed:", e);
        }

        // Only update state if Firestore returned data
        // This prevents DEFAULT_TASKS from overwriting real data on a new device
        if (t)  setTasks(t);
        if (l)  setLogs(l);
        if (g)  setGoals(g);
        if (tz) setTimezone(tz);

      } else {
        setUser(null);
        store.setUid(null);
        setTasks(DEFAULT_TASKS);
        setLogs({});
        setGoals([]);
        setTimezone("Europe/Berlin");
      }
      setLoaded(true);
      setAuthChecked(true);
      // Allow saves only AFTER initial load is complete
      setTimeout(() => setSyncReady(true), 500);
    });
    return () => unsubscribe();
  }, []);

  // ── Sync data to Firestore — only after initial load confirmed ───────────────
  useEffect(() => { if (syncReady && user) store.set("rf_tasks", tasks);    }, [tasks,    syncReady, user]);
  useEffect(() => { if (syncReady && user) store.set("rf_logs",  logs);     }, [logs,     syncReady, user]);
  useEffect(() => { if (syncReady && user) store.set("rf_goals", goals);    }, [goals,    syncReady, user]);
  useEffect(() => { if (syncReady && user) store.set("rf_tz",    timezone); }, [timezone, syncReady, user]);

  const viewKey     = selectedDate || tkey;

  const viewTasks   = tasks.filter(t => taskAppliesToDate(t, viewKey)).sort((a,b) => (a.startTime||"00:00").localeCompare(b.startTime||"00:00"));
  const viewLog     = logs[viewKey] || {};
  const completedToday = viewTasks.filter(t => viewLog[t.id]).length;
  const totalToday     = viewTasks.length;
  const pct            = totalToday ? Math.round((completedToday / totalToday) * 100) : 0;

  // Today's real stats for header streak/pct (always today, not viewKey)
  const todayTasks     = tasks.filter(t => taskAppliesToDate(t, tkey));
  const todayLog       = logs[tkey] || {};
  const todayPct       = todayTasks.length ? Math.round(todayTasks.filter(t=>todayLog[t.id]).length / todayTasks.length * 100) : 0;

  const toggleTask = useCallback((taskId, dateKey) => {
    const task  = tasks.find(t => t.id === taskId);
    const dkey  = dateKey || tkey;
    const wasOn = !!(logs[dkey]?.[taskId]);
    const nowOn = !wasOn;

    setLogs(prev => ({ ...prev, [dkey]: { ...(prev[dkey]||{}), [taskId]: nowOn } }));

    // Only update milestone if toggling on today's date (avoids double-counting)
    if (dkey === tkey && task?.linkedMilestone?.goalId && task?.linkedMilestone?.milestoneId) {
      const { goalId, milestoneId } = task.linkedMilestone;
      setGoals(prev => prev.map(g => {
        if (g.id !== goalId) return g;
        const milestones = (g.milestones || []).map(m =>
          m.id === milestoneId ? { ...m, done: nowOn } : m
        );
        return { ...g, milestones, current: milestones.filter(m => m.done).length };
      }));
    }
  }, [tkey, tasks, logs]);

  const streak = (() => {
    let s = 0;
    const d = new Date();
    for (let i = 0; i < 366; i++) {
      const key        = d.toLocaleDateString("en-CA", { timeZone: timezone });
      const applicable = tasks.filter(t => taskAppliesToDate(t, key));
      const done       = applicable.filter(t => (logs[key]||{})[t.id]).length;
      if (done === 0 && key !== tkey) break;
      if (done > 0) s++;
      d.setDate(d.getDate() - 1);
    }
    return s;
  })();

  const tzLabel = TIMEZONES.find(t => t.tz === timezone)?.label || timezone;
  const tabs = [
    { id:"today",   label:"Schedule",  icon:"list"     },
    { id:"history", label:"Calendar", icon:"calendar" },
    { id:"stats",   label:"Stats",    icon:"chart"    },
    { id:"goals",   label:"Goals",    icon:"target"   },
  ];

  const handleLogout = () => window._auth.signOut();

  // Loading splash
  if (!authChecked) return (
    <div style={{ minHeight:"100vh", background:"#080810", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'DM Mono',monospace" }}>
      <div style={{ textAlign:"center" }}>
        <div style={{ fontFamily:"'Syne',sans-serif", fontSize:22, fontWeight:800, color:"#fff", marginBottom:8 }}>ROUTINEFLOW</div>
        <div style={{ fontSize:11, color:"#525270", letterSpacing:"2px" }}>LOADING…</div>
      </div>
    </div>
  );

  // Auth gate
  if (!user) return <AuthScreen />;

  // Avatar initials
  const initials = (user.name || user.email).split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);

  return (
    <div style={{ fontFamily:"'DM Mono','Courier New',monospace", background:"#080810", minHeight:"100vh", color:"#e8e6f0" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:#080810}
        ::-webkit-scrollbar-thumb{background:#232340;border-radius:2px}
        .task-row{transition:background 0.18s}
        .task-row:hover{background:#0e0e20!important}
        .tab-btn{transition:color 0.18s,border-color 0.18s}
        .tab-btn:hover{color:#fff!important}
        .btn-glow:hover{box-shadow:0 0 18px rgba(249,115,22,0.35)}
        .day-cell{transition:transform 0.13s;cursor:pointer}
        .day-cell:hover{transform:scale(1.1)}
        input,select,textarea{font-family:'DM Mono',monospace!important}
        .progress-bar{transition:width 1s cubic-bezier(0.4,0,0.2,1)}
        .fade-in{animation:fadeIn 0.28s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
        .tz-drop{position:absolute;top:calc(100% + 6px);right:0;background:#0c0c1a;border:1px solid #242444;border-radius:10px;padding:6px;z-index:400;min-width:195px;max-height:270px;overflow-y:auto;box-shadow:0 10px 36px rgba(0,0,0,0.55)}
        .tz-item{padding:8px 12px;border-radius:6px;cursor:pointer;font-size:12px;color:#c0bdd8;transition:background 0.13s,color 0.13s;display:flex;justify-content:space-between;align-items:center}
        .tz-item:hover{background:#1a1a30;color:#fff}
        .tz-item.sel{background:#f97316;color:#fff;font-weight:500}
        .chip{padding:5px 11px;border-radius:20px;border:1px solid #2a2a48;font-size:11px;cursor:pointer;transition:all 0.13s;background:transparent;color:#b0b0c8;font-family:'DM Mono',monospace;letter-spacing:.5px}
        .chip.on{background:#f97316;border-color:#f97316;color:#fff}
        .chip:hover:not(.on){border-color:#f97316;color:#f97316}
        .dchip{width:32px;height:32px;border-radius:6px;border:1px solid #2a2a48;font-size:11px;cursor:pointer;transition:all 0.13s;background:transparent;color:#b0b0c8;font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center}
        .dchip.on{background:#f97316;border-color:#f97316;color:#fff}
        .dchip:hover:not(.on){border-color:#f97316;color:#f97316}
        .now-pill{display:inline-flex;align-items:center;margin-left:8px;font-size:10px;color:#f97316;background:#f9731622;padding:2px 7px;border-radius:3px;letter-spacing:.8px;animation:pulse 2s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .shimmer-bar{background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);background-size:200% 100%;animation:shimmer 1.8s infinite}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .ms-row{transition:background 0.15s;border-radius:8px}
        .ms-row:hover{background:#12122a!important}
        .ms-done{text-decoration:line-through;color:#a0a0bc!important}
        .goal-card{transition:border-color 0.2s}
        .link-option{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:#c0bdd8;transition:background 0.13s}
        .link-option:hover{background:#1a1a30}
        .link-option.sel{background:#f9731620;color:#f97316;border:1px solid #f9731640}
        .overdue-badge{display:inline-flex;align-items:center;gap:3px;background:#f43f5e22;color:#f43f5e;border:1px solid #f43f5e44;border-radius:4px;padding:2px 7px;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:500}
        .ms-overdue{border-color:#f43f5e44!important;background:#120a0a!important}
        .ms-progress-track{background:#13132a;border-radius:3px;height:4px;overflow:hidden;margin-top:7px}
        .heat-cell{border-radius:4px;transition:transform 0.1s;cursor:default}
        .heat-cell:hover{transform:scale(1.15)}
      `}</style>

      {/* ── Header — designed for iPhone 13 Pro (390px) ── */}
      <div style={{ borderBottom:"1px solid #181830", background:"#0b0b18" }}>

        {/* ── Row 1: Logo  ←→  Avatar · SYNC · OUT ── */}
        {/* Max content: ~148px logo + flex spacer + ~120px controls = always fits 390px */}
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"11px 14px 6px" }}>

          {/* Logo */}
          <div>
            <div style={{ fontFamily:"'Syne',sans-serif", fontSize:19, fontWeight:800, letterSpacing:"-0.5px", color:"#fff", lineHeight:1 }}>ROUTINEFLOW</div>
            <div style={{ fontSize:9, color:"#a0a0bc", letterSpacing:"1.5px", textTransform:"uppercase", marginTop:3 }}>
              {new Date().toLocaleDateString("en-GB",{ timeZone:timezone, weekday:"short", day:"numeric", month:"short" })}
            </div>
          </div>

          {/* Controls — Avatar · Bell · SYNC · OUT */}
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>

            {/* Avatar circle */}
            <div title={user.email}
              style={{ width:30, height:30, borderRadius:"50%", background:"linear-gradient(135deg,#f97316,#f43f5e)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:"#fff", flexShrink:0, letterSpacing:".5px" }}>
              {initials}
            </div>

            {/* Bell — notification toggle */}
            <button onClick={() => notifPermission==='granted' ? setShowNotifPanel(true) : setShowNotifBanner(true)}
              title="Notification settings"
              style={{ flexShrink:0, background: notifPermission==='granted' && notifSettings.enabled ? "#10b98114":"#1a1a2e", border:`1px solid ${notifPermission==='granted' && notifSettings.enabled ? "#10b98155":"#252545"}`, borderRadius:7, padding:"4px 8px", cursor:"pointer", fontSize:15, transition:"all 0.2s" }}>
              {notifPermission==='granted' && notifSettings.enabled ? "🔔" : "🔕"}
            </button>

            {/* SYNC — tappable cloud reload */}
            <button
              title={syncReady ? "Tap to reload data from cloud" : "Loading…"}
              onClick={async () => {
                if (!user) return;
                setSyncReady(false);
                store.setUid(user.uid);
                try {
                  const [t, l, g, tz] = await Promise.all([
                    store.get("rf_tasks"), store.get("rf_logs"),
                    store.get("rf_goals"), store.get("rf_tz"),
                  ]);
                  if (t) setTasks(t); if (l) setLogs(l);
                  if (g) setGoals(g); if (tz) setTimezone(tz);
                } catch(e) { console.warn("Sync failed:", e); }
                setTimeout(() => setSyncReady(true), 500);
              }}
              style={{ display:"flex", alignItems:"center", gap:5, background:syncReady?"#10b98114":"#f9731614", border:`1px solid ${syncReady?"#10b98155":"#f9731655"}`, borderRadius:7, padding:"5px 10px", cursor:"pointer", fontFamily:"inherit", transition:"all 0.2s", flexShrink:0 }}>
              <span style={{ fontSize:12 }}>{syncReady ? "☁" : "↻"}</span>
              <span style={{ fontSize:9, fontWeight:600, color:syncReady?"#10b981":"#f97316", letterSpacing:".5px" }}>
                {syncReady ? "SYNC" : "…"}
              </span>
            </button>

            {/* OUT */}
            <button onClick={handleLogout} title="Sign out"
              style={{ display:"flex", alignItems:"center", background:"none", border:"1px solid #2a2a45", borderRadius:7, padding:"5px 10px", color:"#6e6e8a", fontSize:9, fontWeight:600, fontFamily:"inherit", cursor:"pointer", letterSpacing:".5px", transition:"all 0.15s", flexShrink:0 }}
              onMouseEnter={e=>{e.currentTarget.style.color="#f43f5e";e.currentTarget.style.borderColor="#f43f5e55";}}
              onMouseLeave={e=>{e.currentTarget.style.color="#6e6e8a";e.currentTarget.style.borderColor="#2a2a45";}}>
              OUT
            </button>
          </div>
        </div>

        {/* ── Row 2: Clock · Streak · Today% ── */}
        {/* Clock takes flex:1, streak and today% take fixed space — fits 390px comfortably */}
        <div style={{ display:"flex", alignItems:"center", gap:8, padding:"0 14px 11px" }}>

          {/* Clock + TZ — stretches to fill */}
          <div style={{ position:"relative", flex:1, minWidth:0 }}>
            <button onClick={() => setTzOpen(o => !o)}
              style={{ display:"flex", alignItems:"center", gap:7, cursor:"pointer", background:"#0f0f1e", border:"1px solid #1e1e38", borderRadius:8, padding:"7px 11px", outline:"none", color:"inherit", fontFamily:"inherit", width:"100%" }}>
              <Icon name="clock" size={13} />
              <span style={{ fontSize:13, fontWeight:500, color:"#fff", letterSpacing:"1.5px", fontVariantNumeric:"tabular-nums", flexShrink:0 }}>{clock}</span>
              <span style={{ fontSize:10, color:"#b0b0c8", flex:1, textAlign:"left", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{tzLabel}</span>
              <Icon name="chev" size={11} />
            </button>
            {tzOpen && (
              <div className="tz-drop">
                <div style={{ fontSize:9, color:"#a0a0bc", letterSpacing:"2px", padding:"4px 12px 8px", textTransform:"uppercase" }}>Timezone</div>
                {TIMEZONES.map(t => (
                  <div key={t.tz} className={`tz-item${timezone===t.tz?" sel":""}`}
                    onClick={() => { setTimezone(t.tz); setTzOpen(false); }}>
                    <span>{t.label}</span>
                    <span style={{ fontSize:10, opacity:.65, fontVariantNumeric:"tabular-nums" }}>
                      {new Date().toLocaleTimeString("en-GB",{ timeZone:t.tz, hour:"2-digit", minute:"2-digit" })}
                    </span>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Divider */}
          <div style={{ width:1, height:22, background:"#252540", flexShrink:0 }} />

          {/* Streak */}
          <div style={{ textAlign:"center", flexShrink:0 }}>
            <div style={{ display:"flex", alignItems:"center", gap:3, color:"#f97316", fontWeight:600, fontSize:13, lineHeight:1 }}>
              <Icon name="flame" size={12} />{streak}
            </div>
            <div style={{ fontSize:8, color:"#6e6e8a", letterSpacing:"1px", marginTop:2 }}>STREAK</div>
          </div>

          {/* Divider */}
          <div style={{ width:1, height:22, background:"#252540", flexShrink:0 }} />

          {/* Today % */}
          <div style={{ textAlign:"center", flexShrink:0 }}>
            <div style={{ color:"#fff", fontWeight:600, fontSize:13, lineHeight:1 }}>{todayPct}%</div>
            <div style={{ fontSize:8, color:"#6e6e8a", letterSpacing:"1px", marginTop:2 }}>TODAY</div>
          </div>

        </div>
      </div>

      {/* Backdrop to close TZ dropdown */}
      {tzOpen && <div style={{ position:"fixed", inset:0, zIndex:399 }} onClick={() => setTzOpen(false)} />}

      {/* Notification permission banner */}
      {showNotifBanner && notifPermission !== 'granted' && (
        <div style={{ maxWidth:720, margin:"12px auto 0", padding:"0 15px" }}>
          <NotifBanner
            onGranted={() => {
              setNotifPermission('granted');
              setShowNotifBanner(false);
            }}
            onDismiss={() => {
              setShowNotifBanner(false);
              localStorage.setItem('rf_notif_dismissed', '1');
            }}
          />
        </div>
      )}

      {/* Notification settings panel */}
      {showNotifPanel && (
        <NotifSettings
          settings={notifSettings}
          onChange={s => setNotifSettings(s)}
          onClose={() => setShowNotifPanel(false)}
          tasks={tasks}
          timezone={timezone}
        />
      )}

      {/* ── Tabs ── */}
      <div style={{ display:"flex", borderBottom:"1px solid #181830", background:"#0b0b18", padding:"0 18px", overflowX:"auto" }}>
        {tabs.map(t => (
          <button key={t.id} className="tab-btn" onClick={() => setTab(t.id)}
            style={{ padding:"11px 13px", background:"none", border:"none", cursor:"pointer", fontSize:11, letterSpacing:"1px", textTransform:"uppercase", fontFamily:"inherit", display:"flex", alignItems:"center", gap:6, borderBottom:tab===t.id?"2px solid #f97316":"2px solid transparent", color:tab===t.id?"#fff":"#a0a0bc", marginBottom:-1, whiteSpace:"nowrap" }}>
            <Icon name={t.icon} size={12} /> {t.label}
          </button>
        ))}
      </div>

      {/* ── Main Content ── */}
      <div style={{ maxWidth:720, margin:"0 auto", padding:"18px 15px" }} className="fade-in" key={tab}>
        {tab==="today"   && <TodayView tasks={viewTasks} allTasks={tasks} viewLog={viewLog} viewKey={viewKey} todayKey={tkey} selectedDate={selectedDate} setSelectedDate={setSelectedDate} toggleTask={toggleTask} completedToday={completedToday} totalToday={totalToday} pct={pct} onAddTask={() => setModal("task")} onEditTask={t => { setEditTask(t); setModal("task"); }} onDeleteTask={id => setTasks(p => p.filter(t => t.id!==id))} timezone={timezone} goals={goals} />}
        {tab==="history" && <HistoryView tasks={tasks} logs={logs} timezone={timezone} setSelectedDate={setSelectedDate} setTab={setTab} />}
        {tab==="stats"   && <StatsView tasks={tasks} logs={logs} timezone={timezone} goals={goals} />}
        {tab==="goals"   && <GoalsView goals={goals} setGoals={setGoals} onAdd={() => setModal("goal")} />}
      </div>

      {/* ── Modals ── */}
      {modal==="task" && (
        <TaskModal
          key={editTask?.id || "new"}
          onClose={() => { setModal(null); setEditTask(null); }}
          onSave={t => { setTasks(p => resolveOverlaps(editTask ? p.map(x => x.id===editTask.id ? t : x) : [...p, t])); setModal(null); setEditTask(null); }}
          colorOptions={COLORS}
          initial={editTask}
          allTasks={tasks}
          goals={goals}
        />
      )}
      {modal==="goal" && <GoalModal onClose={() => setModal(null)} onSave={g => { setGoals(p => [...p, g]); setModal(null); }} />}
    </div>
  );
}

// ─── Today View ───────────────────────────────────────────────────────────────
function TodayView({ tasks, allTasks, viewLog, viewKey, todayKey, selectedDate, setSelectedDate, toggleTask, completedToday, totalToday, pct, onAddTask, onEditTask, onDeleteTask, timezone, goals }) {
  const doneMins  = tasks.filter(t => viewLog[t.id]).reduce((s,t) => s+t.duration, 0);
  const totalMins = tasks.reduce((s,t) => s+t.duration, 0);

  const isToday    = viewKey === todayKey;
  const isFuture   = viewKey > todayKey;
  const isPast     = viewKey < todayKey;

  // Date navigation helpers
  const shiftDate = (delta) => {
    const d = new Date(viewKey + "T00:00:00");
    d.setDate(d.getDate() + delta);
    const next = d.toLocaleDateString("en-CA");
    setSelectedDate(next === todayKey ? null : next);
  };

  const dateLabel = (() => {
    if (isToday) return "TODAY";
    const d = new Date(viewKey + "T00:00:00");
    const t = new Date(todayKey + "T00:00:00");
    const diff = Math.round((d - t) / 864e5);
    if (diff === 1)  return "TOMORROW";
    if (diff === -1) return "YESTERDAY";
    return d.toLocaleDateString("en-GB", { weekday:"short", day:"numeric", month:"short", year:"numeric" }).toUpperCase();
  })();

  const fullDateDisplay = (() => {
    const d = new Date(viewKey + "T00:00:00");
    return d.toLocaleDateString("en-GB", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
  })();

  const fmtTime12 = t => {
    if (!t) return null;
    const [h, m] = t.split(":").map(Number);
    return `${h%12||12}:${String(m).padStart(2,"0")} ${h>=12?"PM":"AM"}`;
  };

  const repeatLabel = r => {
    if (!r || r.type==="daily") return "Every day";
    if (r.type==="weekdays")   return r.days?.length ? r.days.map(d=>WEEKDAYS[d]).join(", ") : "No days";
    if (r.type==="monthDates") return r.dates?.length ? r.dates.sort((a,b)=>a-b).map(ordinal).join(", ") : "No dates";
    return "";
  };

  const nowMins = (() => { const n = new Date(); return n.getHours()*60+n.getMinutes(); })();

  return (
    <div>

      {/* ── Date Navigator ── */}
      <div style={{ background:"#0e0e1d", border:"1px solid #181830", borderRadius:12, padding:"12px 16px", marginBottom:14, display:"flex", alignItems:"center", gap:10 }}>
        {/* Prev */}
        <button onClick={() => shiftDate(-1)}
          style={{ background:"#13132a", border:"1px solid #525270", borderRadius:7, padding:"7px 11px", color:"#c0bdd8", cursor:"pointer", display:"flex", alignItems:"center", fontSize:14, flexShrink:0, lineHeight:1 }}>
          ‹
        </button>

        {/* Date display + picker */}
        <div style={{ flex:1, textAlign:"center", position:"relative" }}>
          <div style={{ fontSize:11, letterSpacing:"2px", color: isFuture?"#3b82f6": isPast?"#b0b0c8":"#f97316", textTransform:"uppercase", fontWeight:600, marginBottom:2 }}>
            {isFuture && "▸ "}{isPast && "◂ "}{dateLabel}
          </div>
          <div style={{ fontSize:12, color:"#a0a0bc" }}>{fullDateDisplay}</div>
          {/* Invisible date input overlaid for native picker on click */}
          <input type="date" value={viewKey}
            onChange={e => {
              const v = e.target.value;
              setSelectedDate(v === todayKey ? null : v);
            }}
            style={{ position:"absolute", inset:0, opacity:0, cursor:"pointer", width:"100%", height:"100%" }}
          />
        </div>

        {/* Next */}
        <button onClick={() => shiftDate(1)}
          style={{ background:"#13132a", border:"1px solid #525270", borderRadius:7, padding:"7px 11px", color:"#c0bdd8", cursor:"pointer", display:"flex", alignItems:"center", fontSize:14, flexShrink:0, lineHeight:1 }}>
          ›
        </button>

        {/* Jump to today */}
        {!isToday && (
          <button onClick={() => setSelectedDate(null)}
            style={{ background:"#f97316", border:"none", borderRadius:7, padding:"7px 12px", color:"#fff", cursor:"pointer", fontSize:10, letterSpacing:"1px", fontFamily:"inherit", flexShrink:0, whiteSpace:"nowrap" }}>
            ↩ TODAY
          </button>
        )}
      </div>

      {/* Future / Past banner */}
      {isFuture && (
        <div style={{ background:"#0d1a2e", border:"1px solid #3b82f633", borderRadius:9, padding:"9px 14px", marginBottom:14, display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:16 }}>📅</span>
          <div style={{ fontSize:12, color:"#3b82f6" }}>Viewing future schedule — tasks shown are based on their repeat rules. You can pre-check them here.</div>
        </div>
      )}
      {isPast && (
        <div style={{ background:"#0d0d1c", border:"1px solid #6e6e8a", borderRadius:9, padding:"9px 14px", marginBottom:14, display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:16 }}>📜</span>
          <div style={{ fontSize:12, color:"#b0b0c8" }}>Viewing past schedule — you can retroactively mark tasks as done.</div>
        </div>
      )}

      {/* Progress card */}
      <div style={{ background:"linear-gradient(135deg,#0d0d1e 0%,#0f0f26 100%)", border:`1px solid ${isFuture?"#3b82f630":isPast?"#6e6e8a":"#181830"}`, borderRadius:12, padding:20, marginBottom:18 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:14 }}>
          <div>
            <div style={{ fontFamily:"'Syne',sans-serif", fontSize:46, fontWeight:800, lineHeight:1, color:pct===100?"#10b981":isFuture?"#3b82f6":"#fff" }}>
              {pct}<span style={{ fontSize:20, color:"#a0a0bc" }}>%</span>
            </div>
            <div style={{ fontSize:11, color:"#a0a0bc", letterSpacing:"2px", marginTop:4 }}>
              {completedToday}/{totalToday} TASKS · {fmtMins(doneMins)} / {fmtMins(totalMins)}
            </div>
          </div>
          {pct===100 && <div style={{ background:"#10b98116", border:"1px solid #10b98138", borderRadius:8, padding:"7px 13px", fontSize:11, color:"#10b981", letterSpacing:"1px" }}>✦ COMPLETE</div>}
          {isFuture && pct===0 && <div style={{ background:"#3b82f610", border:"1px solid #3b82f630", borderRadius:8, padding:"7px 13px", fontSize:11, color:"#3b82f6", letterSpacing:"1px" }}>PLANNED</div>}
        </div>
        <div style={{ background:"#13132a", borderRadius:4, height:6, overflow:"hidden" }}>
          <div className="progress-bar" style={{ height:"100%", width:`${pct}%`, background:pct===100?"#10b981":isFuture?"#3b82f6":"linear-gradient(90deg,#f97316,#f43f5e)", borderRadius:4 }} />
        </div>
      </div>

      {/* Day Timeline */}
      <DayTimeline tasks={tasks} nowMins={isToday ? nowMins : null} />

      {/* Toolbar */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:13 }}>
        <div style={{ fontSize:11, letterSpacing:"2px", color:"#a0a0bc", textTransform:"uppercase" }}>
          {isToday ? "Today's" : isFuture ? "Planned" : "Past"} Schedule
        </div>
        <button onClick={onAddTask} className="btn-glow"
          style={{ display:"flex", alignItems:"center", gap:6, background:"#f97316", border:"none", borderRadius:6, padding:"6px 14px", color:"#fff", fontSize:11, fontFamily:"inherit", cursor:"pointer", letterSpacing:"1px" }}>
          <Icon name="plus" size={12} /> ADD TASK
        </button>
      </div>

      {tasks.length === 0 && (
        <div style={{ textAlign:"center", padding:"50px 20px", color:"#525270", fontSize:13 }}>
          {isFuture ? "No tasks repeat on this day." : isPast ? "No tasks were scheduled on this day." : "No tasks scheduled for today."}
        </div>
      )}

      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {tasks.map(task => {
          const done     = !!viewLog[task.id];
          const tMins    = task.startTime ? parseInt(task.startTime)*60 + parseInt(task.startTime.split(":")[1]) : null;
          const isActive = isToday && tMins!==null && nowMins>=tMins && nowMins<tMins+task.duration;

          return (
            <div key={task.id} className="task-row"
              style={{ background:done?"#0c0c1c":"#0e0e1d", border:`1px solid ${isActive&&!done?task.color+"70":done?task.color+"28":isFuture?"#1a2035":"#181830"}`, borderRadius:10, padding:"11px 12px", cursor:"pointer", position:"relative", overflow:"hidden" }}
              onClick={() => toggleTask(task.id, viewKey)}>

              {isActive && !done && <div className="shimmer-bar" style={{ position:"absolute", inset:0, pointerEvents:"none", opacity:.06 }} />}
              {isActive && !done && <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:`linear-gradient(90deg,transparent,${task.color},transparent)` }} />}
              {done && <div style={{ position:"absolute", inset:0, background:task.color+"06", pointerEvents:"none" }} />}

              {/* ── Row 1: Checkbox · Accent · Name · Actions ── */}
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>

                {/* Checkbox */}
                <div style={{ width:22, height:22, borderRadius:6, border:`2px solid ${done?task.color:isFuture?"#1e2a4a":"#6e6e8a"}`, background:done?task.color:"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"all 0.18s", color:"#fff" }}>
                  {done && <Icon name="check" size={11} />}
                </div>

                {/* Color accent */}
                <div style={{ width:3, height:26, background:task.color, borderRadius:2, flexShrink:0, opacity:done?0.35:1 }} />

                {/* Task name — truncated */}
                <div style={{ flex:1, minWidth:0, fontSize:14, color:done?"#a0a0bc":"#e8e6f0", textDecoration:done?"line-through":"none", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                  {task.name}
                  {isActive && !done && <span className="now-pill">NOW</span>}
                </div>

                {/* Duration chip + Edit + Delete — always visible, never hidden */}
                <div style={{ display:"flex", alignItems:"center", gap:4, flexShrink:0 }}>
                  <span style={{ background:"#13132a", padding:"2px 7px", borderRadius:4, fontSize:10, color:"#b0b0c8", whiteSpace:"nowrap" }}>{fmtMins(task.duration)}</span>
                  <button
                    onClick={e => { e.stopPropagation(); onEditTask(task); }}
                    style={{ background:"#13132a", border:"1px solid #232348", borderRadius:6, cursor:"pointer", color:"#a0a0bc", padding:"4px 6px", display:"flex", alignItems:"center", flexShrink:0, transition:"all 0.15s" }}
                    onMouseEnter={e=>e.currentTarget.style.color="#f97316"}
                    onMouseLeave={e=>e.currentTarget.style.color="#a0a0bc"}>
                    <Icon name="edit" size={12} />
                  </button>
                  <button
                    onClick={e => { e.stopPropagation(); onDeleteTask(task.id); }}
                    style={{ background:"#13132a", border:"1px solid #232348", borderRadius:6, cursor:"pointer", color:"#a0a0bc", padding:"4px 6px", display:"flex", alignItems:"center", flexShrink:0, transition:"all 0.15s" }}
                    onMouseEnter={e=>e.currentTarget.style.color="#f43f5e"}
                    onMouseLeave={e=>e.currentTarget.style.color="#a0a0bc"}>
                    <Icon name="trash" size={12} />
                  </button>
                </div>
              </div>

              {/* ── Row 2: Time · Category · Repeat · Goal ── */}
              <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:6, paddingLeft:32, flexWrap:"wrap" }}>
                {task.startTime && (
                  <span style={{ color:"#b0b0c8", display:"flex", alignItems:"center", gap:3, fontSize:11 }}>
                    <Icon name="clock" size={9} /> {fmt12(task.startTime)}
                    <span style={{ color:"#6e6e8a" }}>–{fmt12(endTime(task.startTime,task.duration))}</span>
                  </span>
                )}
                <span style={{ fontSize:11, color:"#6e6e8a" }}>{task.category}</span>
                <span style={{ display:"flex", alignItems:"center", gap:3, color:"#6e6e8a", fontSize:11 }}>
                  <Icon name="repeat" size={9} /> {repeatLabel(task.repeat)}
                </span>
                {task.linkedMilestone?.goalId && (() => {
                  const g = goals?.find(x => x.id === task.linkedMilestone.goalId);
                  const m = g?.milestones?.find(x => x.id === task.linkedMilestone.milestoneId);
                  return g ? (
                    <span style={{ display:"flex", alignItems:"center", gap:3, background:"#f9731618", color:"#f97316", padding:"2px 6px", borderRadius:4, fontSize:10 }}>
                      <Icon name="flag" size={9} /> {g.name}{m ? ` · ${m.name}` : ""}
                    </span>
                  ) : null;
                })()}
              </div>
            </div>
          );
        })}
      </div>

      {allTasks.length > tasks.length && (
        <div style={{ marginTop:18, padding:12, background:"#0d0d1c", border:"1px dashed #181830", borderRadius:10 }}>
          <div style={{ fontSize:11, color:"#6e6e8a" }}>
            {allTasks.length-tasks.length} task{allTasks.length-tasks.length>1?"s":""} not scheduled for this day — edit their repeat settings to include it.
          </div>
        </div>
      )}
    </div>
  );
}

// ─── History View ─────────────────────────────────────────────────────────────
function HistoryView({ tasks, logs, timezone, setSelectedDate, setTab }) {
  const now = new Date();
  const [vy, setVy] = useState(now.getFullYear());
  const [vm, setVm] = useState(now.getMonth());
  const [hoveredKey, setHoveredKey] = useState(null);
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const firstDay    = new Date(vy,vm,1).getDay();
  const daysInMonth = new Date(vy,vm+1,0).getDate();
  const todayStr    = todayKey(timezone);

  const prevMonth = () => { if(vm===0){setVy(y=>y-1);setVm(11);}else setVm(m=>m-1); };
  const nextMonth = () => { if(vm===11){setVy(y=>y+1);setVm(0);}else setVm(m=>m+1); };

  const getPct = d => {
    const key = `${vy}-${String(vm+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const applicable = tasks.filter(t => taskAppliesToDate(t,key));
    if (!applicable.length) return -1;
    const done = applicable.filter(t => (logs[key]||{})[t.id]).length;
    return done/applicable.length;
  };

  const goToDate = (key) => {
    setSelectedDate(key === todayStr ? null : key);
    setTab("today");
  };

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
        <button onClick={prevMonth} style={{ background:"#13132a", border:"none", color:"#e8e6f0", borderRadius:6, padding:"6px 14px", cursor:"pointer", fontFamily:"inherit", fontSize:13 }}>←</button>
        <div style={{ fontFamily:"'Syne',sans-serif", fontSize:17, fontWeight:700 }}>{MONTHS[vm]} {vy}</div>
        <button onClick={nextMonth} style={{ background:"#13132a", border:"none", color:"#e8e6f0", borderRadius:6, padding:"6px 14px", cursor:"pointer", fontFamily:"inherit", fontSize:13 }}>→</button>
      </div>

      {/* Click-to-navigate hint */}
      <div style={{ fontSize:10, color:"#6e6e8a", letterSpacing:"1px", textAlign:"center", marginBottom:10, textTransform:"uppercase" }}>
        Tap any date to view its schedule →
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4, marginBottom:6 }}>
        {WEEKDAYS.map(d => <div key={d} style={{ textAlign:"center", fontSize:10, color:"#6e6e8a", letterSpacing:".5px" }}>{d}</div>)}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4 }}>
        {Array(firstDay).fill(null).map((_,i) => <div key={"e"+i} />)}
        {Array(daysInMonth).fill(null).map((_,i) => {
          const d   = i+1;
          const pct = getPct(d);
          const key = `${vy}-${String(vm+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          const isToday   = key === todayStr;
          const isHovered = key === hoveredKey;
          const isFuture  = key > todayStr;
          const bg = isHovered
            ? "#f9731640"
            : pct < 0  ? "#131328"
            : pct === 0 ? "#131328"
            : pct < 0.5 ? "#6d28d944"
            : pct < 1   ? "#f97316"
            : "#10b981";

          // Task count for tooltip label
          const applicable = tasks.filter(t => taskAppliesToDate(t, key));
          const done = applicable.filter(t => (logs[key]||{})[t.id]).length;
          const taskLabel = applicable.length
            ? `${done}/${applicable.length} tasks`
            : isFuture ? "planned" : "no tasks";

          return (
            <div
              key={d}
              onClick={() => goToDate(key)}
              onMouseEnter={() => setHoveredKey(key)}
              onMouseLeave={() => setHoveredKey(null)}
              style={{
                aspectRatio:"1", borderRadius:8, background:bg,
                display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                fontSize:11, color: isHovered ? "#fff" : pct>0 ? "#fff" : "#525270",
                border: isToday ? "2px solid #f97316" : isHovered ? "1px solid #f9731680" : "1px solid #181830",
                fontWeight: isToday ? 700 : 400,
                cursor:"pointer",
                transition:"background 0.12s, border 0.12s, transform 0.1s",
                transform: isHovered ? "scale(1.08)" : "scale(1)",
                position:"relative",
              }}
            >
              <span>{d}</span>
              {isHovered && (
                <span style={{ fontSize:8, color:"rgba(255,255,255,.65)", letterSpacing:".3px", marginTop:2, whiteSpace:"nowrap" }}>
                  {taskLabel}
                </span>
              )}
              {/* Small arrow indicator on hover */}
              {isHovered && (
                <div style={{ position:"absolute", bottom:3, right:4, fontSize:8, color:"#f97316", opacity:.8 }}>→</div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ display:"flex", gap:14, marginTop:14, flexWrap:"wrap" }}>
        {[["#131328","0%"],["#6d28d944","1–49%"],["#f97316","50–99%"],["#10b981","100%"]].map(([c,l]) => (
          <div key={l} style={{ display:"flex", alignItems:"center", gap:6, fontSize:11, color:"#a0a0bc" }}>
            <div style={{ width:12, height:12, borderRadius:3, background:c, border:"1px solid #525270" }} /> {l}
          </div>
        ))}
      </div>

      {/* Last 7 days bar */}
      <div style={{ marginTop:26 }}>
        <div style={{ fontSize:11, letterSpacing:"2px", color:"#a0a0bc", marginBottom:13, textTransform:"uppercase" }}>Last 7 Days</div>
        {Array(7).fill(null).map((_,i) => {
          const d   = new Date(); d.setDate(d.getDate()-(6-i));
          const key = d.toLocaleDateString("en-CA",{timeZone:timezone});
          const applicable = tasks.filter(t => taskAppliesToDate(t,key));
          const done  = applicable.filter(t => (logs[key]||{})[t.id]).length;
          const total = applicable.length;
          const p     = total ? done/total : 0;
          return (
            <div key={key} onClick={() => goToDate(key)}
              style={{ display:"flex", alignItems:"center", gap:12, marginBottom:8, cursor:"pointer", borderRadius:6, padding:"3px 4px", transition:"background 0.1s" }}
              onMouseEnter={e => e.currentTarget.style.background="#13132a"}
              onMouseLeave={e => e.currentTarget.style.background="transparent"}>
              <div style={{ width:34, fontSize:11, color:"#a0a0bc", textAlign:"right" }}>{WEEKDAYS[d.getDay()]}</div>
              <div style={{ flex:1, background:"#13132a", borderRadius:4, height:8, overflow:"hidden" }}>
                <div style={{ height:"100%", width:`${p*100}%`, background:p===1?"#10b981":"#f97316", borderRadius:4, transition:"width 0.7s ease" }} />
              </div>
              <div style={{ width:40, fontSize:11, color:"#a0a0bc" }}>{done}/{total}</div>
              <div style={{ fontSize:10, color:"#f97316", opacity:.6 }}>→</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

          <div style={{ display:"flex", alignItems:"center", gap:8 }}>

          </div>
        </div>
        <div style={{ background:"#13132a", borderRadius:4, height:8, overflow:"hidden" }}>
          <div style={{ height:"100%", width:`${rate}%`, background:rate===100?"#10b981":color, borderRadius:4, transition:"width 1s ease", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", inset:0, background:"linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent)", backgroundSize:"200% 100%", animation:"shimmer 3s infinite" }} />
          </div>
        </div>
      </div>
      {open && (
        <div style={{ marginTop:8, paddingLeft:16, borderLeft:`2px solid ${color}40`, display:"flex", flexDirection:"column", gap:7 }}>

            <div key={t.id}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3, fontSize:11 }}>
                <span style={{ color:"#9090a8" }}>{t.name}</span>
