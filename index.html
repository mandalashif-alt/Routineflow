// ─── Firestore Storage ────────────────────────────────────────────────────────
let _currentUid = null;

const store = {
  setUid(uid) { _currentUid = uid; },
  async get(key) {
    try {
      if (_currentUid && window._db) {
        const doc = await window._db.collection('users').doc(_currentUid).get();
        if (doc.exists) {
          const val = doc.data()[key];
          return val !== undefined ? val : null;
        }
        return null;
      }
      const v = localStorage.getItem(key);
      return v ? JSON.parse(v) : null;
    } catch { return null; }
  },
  async set(key, val) {
    try {
      if (_currentUid && window._db) {
        await window._db.collection('users').doc(_currentUid).set(
          { [key]: val }, { merge: true }
        );
        return;
      }
      localStorage.setItem(key, JSON.stringify(val));
    } catch {}
  }
};

const t2m      = t => { const [h,m]=(t||"00:00").split(":").map(Number); return h*60+m; };
const addMins  = (t,m) => { const tot=(t2m(t)+m+1440)%1440; return `${String(Math.floor(tot/60)).padStart(2,"0")}:${String(tot%60).padStart(2,"0")}`; };
const fmt12    = t => { if(!t)return""; const [h,m]=t.split(":").map(Number); return `${h%12||12}:${String(m).padStart(2,"0")} ${h>=12?"PM":"AM"}`; };
const endTime  = (start,dur) => addMins(start,dur);

const resolveOverlaps = tasks => {
  const s = [...tasks].sort((a,b) => t2m(a.startTime||"00:00") - t2m(b.startTime||"00:00"));
  for (let i = 0; i < s.length - 1; i++) {
    const end = t2m(s[i].startTime||"00:00") + s[i].duration;
    if (end > t2m(s[i+1].startTime||"00:00"))
      s[i+1] = { ...s[i+1], startTime: addMins(s[i].startTime||"00:00", s[i].duration) };
  }
  return tasks.map(t => s.find(x => x.id===t.id) || t);
};

const taskAppliesToDate = (task, dateStr) => {
  if (!task.repeat || task.repeat.type === "daily") return true;
  const d = new Date(dateStr + "T12:00:00");
  if (task.repeat.type === "weekdays")   return task.repeat.days?.includes(d.getDay()) ?? false;
  if (task.repeat.type === "monthDates") return task.repeat.dates?.includes(d.getDate()) ?? false;
  return true;
};

// ─── Live Clock ───────────────────────────────────────────────────────────────
function useClock(tz) {
  const [time, setTime] = useState("");
  useEffect(() => {
    const tick = () => setTime(new Date().toLocaleTimeString("en-GB", { timeZone:tz, hour:"2-digit", minute:"2-digit", second:"2-digit" }));
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [tz]);
  return time;
}

// ─── Sound Engine ─────────────────────────────────────────────────────────────
const RFSound = {
  _ctx: null,
  getCtx() {
    if (!this._ctx) {
      try { this._ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { return null; }
    }
    if (this._ctx.state === 'suspended') this._ctx.resume();
    return this._ctx;
  },
  _tone(ctx, freq, startSec, durSec, vol=0.7, type='square') {
    const now = ctx.currentTime;
    const t   = now + startSec;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    const comp = ctx.createDynamicsCompressor();
    comp.threshold.value = -6; comp.knee.value = 3; comp.ratio.value = 4;
    osc.connect(gain); gain.connect(comp); comp.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(vol, t + 0.008);
    gain.gain.exponentialRampToValueAtTime(vol * 0.7, t + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + durSec);
    osc.start(t); osc.stop(t + durSec + 0.02);
  },
  chime(vol=0.8) {
    const ctx = this.getCtx(); if (!ctx) return;
    [523, 659, 784].forEach((f, i) => {
      this._tone(ctx, f, i * 0.22, 0.35, vol, 'triangle');
      this._tone(ctx, f * 2, i * 0.22, 0.2, vol * 0.15, 'sine');
    });
  },
  bell(vol=0.8) {
    const ctx = this.getCtx(); if (!ctx) return;
    [0, 0.18, 0.55, 0.73].forEach(t => {
      this._tone(ctx, 880, t, 0.14, vol, 'square');
      this._tone(ctx, 1320, t, 0.10, vol * 0.3, 'triangle');
    });
  },
  ringtone(vol=0.8) {
    const ctx = this.getCtx(); if (!ctx) return;
    const burst = (offset) => {
      for (let i = 0; i < 8; i++) {
        const freq = i % 2 === 0 ? 480 : 620;
        this._tone(ctx, freq, offset + i * 0.07, 0.065, vol, 'square');
      }
    };
    burst(0.0); burst(0.75);
  },
  ping(vol=0.75) {
    const ctx = this.getCtx(); if (!ctx) return;
    this._tone(ctx, 880, 0.00, 0.18, vol, 'triangle');
    this._tone(ctx, 1320, 0.15, 0.22, vol * 0.8, 'triangle');
    this._tone(ctx, 880, 0.0, 0.1, vol * 0.2, 'sine');
  },
  play(name='bell', vol=0.8) {
    try {
      const ctx = this.getCtx();
      if (ctx && ctx.state === 'suspended') {
        ctx.resume().then(() => this._playByName(name, vol));
      } else { this._playByName(name, vol); }
    } catch(e) { console.warn('RFSound error:', e); }
  },
  _playByName(name, vol) {
    if      (name === 'chime')    this.chime(vol);
    else if (name === 'bell')     this.bell(vol);
    else if (name === 'ringtone') this.ringtone(vol);
    else if (name === 'ping')     this.ping(vol);
    else                          this.bell(vol);
  }
};

// ─── Telegram Engine ──────────────────────────────────────────────────────────
const RFTelegram = {
  load() {
    try { const raw = localStorage.getItem('rf_telegram'); return raw ? JSON.parse(raw) : { token:'', chatId:'', enabled:false }; }
    catch { return { token:'', chatId:'', enabled:false }; }
  },
  save(cfg) { try { localStorage.setItem('rf_telegram', JSON.stringify(cfg)); } catch {} },
  async send(text, cfg) {
    const c = cfg || this.load();
    if (!c.enabled || !c.token || !c.chatId) return false;
    try {
      const res = await fetch(`https://api.telegram.org/bot${c.token}/sendMessage`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: c.chatId, text, parse_mode: 'HTML' })
      });
      const json = await res.json();
      return json.ok === true;
    } catch(e) { return false; }
  },
  async test(token, chatId) {
    try {
      const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: chatId, text: '✅ <b>RoutineFlow connected!</b>\n\nYou will now receive task alerts here.', parse_mode: 'HTML' })
      });
      const json = await res.json();
      if (json.ok) return { ok: true };
      return { ok: false, error: json.description || 'Unknown error' };
    } catch(e) { return { ok: false, error: 'Network error — check token and try again.' }; }
  }
};

// ─── Capacitor Local Notifications helper ────────────────────────────────────
// Uses native iOS notifications when in Capacitor (works in background/lock screen)
// Falls back to Web Notifications API in browser
const CapNotif = {
  // Get the native plugin — only available inside Capacitor
  get plugin() {
    try { return window.Capacitor?.Plugins?.LocalNotifications || null; }
    catch { return null; }
  },

  isNative() {
    return !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform() && this.plugin);
  },

  async requestPermission() {
    if (this.isNative()) {
      try {
        const result = await this.plugin.requestPermissions();
        return result.display === 'granted' ? 'granted' : 'denied';
      } catch(e) { return 'denied'; }
    }
    // Browser fallback
    if (!('Notification' in window)) return 'unsupported';
    if (Notification.permission === 'granted') return 'granted';
    if (Notification.permission === 'denied')  return 'denied';
    return await Notification.requestPermission();
  },

  async checkPermission() {
    if (this.isNative()) {
      try {
        const result = await this.plugin.checkPermissions();
        return result.display;
      } catch { return 'denied'; }
    }
    return typeof Notification !== 'undefined' ? Notification.permission : 'unsupported';
  },

  // Schedule a notification at a specific future timestamp (ms)
  async scheduleAt(id, title, body, atMs, sound) {
    if (this.isNative()) {
      try {
        await this.plugin.schedule({
          notifications: [{
            id: Math.abs(id % 2147483647),
            title,
            body,
            schedule: { at: new Date(atMs) },
            sound: sound === 'none' ? null : 'default',
            smallIcon: 'ic_stat_icon',
            actionTypeId: '',
            extra: null,
          }]
        });
      } catch(e) { console.warn('[CapNotif] schedule failed:', e); }
    } else {
      // Browser: use setTimeout
      const ms = atMs - Date.now();
      if (ms > 0) {
        setTimeout(() => {
          try { new Notification(title, { body, tag: String(id) }); } catch {}
          RFSound.play('bell', 0.8);
        }, ms);
      }
    }
  },

  async cancelAll() {
    if (this.isNative()) {
      try {
        const pending = await this.plugin.getPending();
        if (pending.notifications && pending.notifications.length) {
          await this.plugin.cancel({ notifications: pending.notifications });
        }
      } catch(e) { console.warn('[CapNotif] cancelAll failed:', e); }
    }
  }
};

// ─── Notification Engine ──────────────────────────────────────────────────────
const RFNotify = {
  _timers: [],

  async requestPermission() {
    RFSound.getCtx(); // unlock audio at same gesture
    return await CapNotif.requestPermission();
  },

  async checkPermission() {
    return await CapNotif.checkPermission();
  },

  // Show an immediate notification (for foreground use)
  async show(title, body, tag, soundName, volume) {
    // Always play sound in foreground
    RFSound.play(soundName || 'bell', volume ?? 0.8);
    // Send Telegram backup
    RFTelegram.send(`🔔 <b>RoutineFlow</b>\n${title}\n<i>${body}</i>`);
    // Native or browser notification
    if (CapNotif.isNative()) {
      try {
        await CapNotif.plugin.schedule({
          notifications: [{
            id: Math.floor(Math.random() * 99999),
            title, body,
            schedule: { at: new Date(Date.now() + 500) },
            sound: 'default',
          }]
        });
      } catch {}
    } else {
      if (Notification.permission === 'granted') {
        try { new Notification(title, { body, tag }); } catch {}
      }
    }
  },

  clearAll() {
    this._timers.forEach(id => clearTimeout(id));
    this._timers = [];
    CapNotif.cancelAll();
  },

  _saveSchedule(entries) {
    try { localStorage.setItem('rf_sched', JSON.stringify(entries)); } catch {}
  },
  _loadSchedule() {
    try { return JSON.parse(localStorage.getItem('rf_sched')) || []; } catch { return []; } 
  },

  async scheduleTasks(tasks, timezone, settings) {
    this.clearAll();
    if (!settings.enabled) return;

    const perm = await CapNotif.checkPermission();
    if (perm !== 'granted') {
      console.log('[RFNotify] Permission not granted — skipping schedule');
      return;
    }

    const now      = new Date();
    const todayStr = now.toLocaleDateString('en-CA', { timeZone: timezone });
    const sound    = settings.sound || 'bell';
    const volume   = (settings.volume ?? 80) / 100;
    const entries  = [];
    let   idBase   = Date.now();

    tasks.forEach(task => {
      if (!task.startTime) return;
      const taskStart = new Date(todayStr + 'T' + task.startTime + ':00');
      const taskEnd   = new Date(taskStart.getTime() + (task.duration || 30) * 60000);
      const msStart   = taskStart - now;
      const msEnd     = taskEnd   - now;

      // 5-min warning
      if (settings.fiveMin) {
        const msWarn = msStart - 5 * 60000;
        if (msWarn > 0) {
          entries.push({ id: idBase++, at: taskStart.getTime() - 5*60000, title: '⏰ Starting in 5 minutes', body: `${task.name} — ${fmt12(task.startTime)}`, sound });
        } else if (msStart - 60000 > 0) {
          entries.push({ id: idBase++, at: taskStart.getTime() - 60000, title: '⏰ Starting in 1 minute', body: `${task.name} — ${fmt12(task.startTime)}`, sound });
        }
      }

      // Task start
      if (settings.onStart && msStart > 0) {
        entries.push({ id: idBase++, at: taskStart.getTime(), title: `▶ ${task.name}`, body: `Starting now · ${fmt12(task.startTime)}`, sound });
      }

      // Task end
      if (settings.onEnd && msEnd > 0) {
        entries.push({ id: idBase++, at: taskEnd.getTime(), title: `✓ ${task.name} complete`, body: 'Well done! Task finished.', sound: 'ping' });
      }
    });

    // Save for re-arm on app reopen
    this._saveSchedule(entries);

    // Schedule all natively
    for (const entry of entries) {
      await CapNotif.scheduleAt(entry.id, entry.title, entry.body, entry.at, entry.sound);
      // Also set browser setTimeout for foreground sound
      const ms = entry.at - Date.now();
      if (ms > 0 && ms < 86400000) {
        const id = setTimeout(() => {
          RFSound.play(entry.sound || 'bell', volume);
        }, ms);
        this._timers.push(id);
      }
    }

    console.log(`[RFNotify] Scheduled ${entries.length} notifications`);
  },

  async rearmFromStorage() {
    const entries = this._loadSchedule();
    if (!entries.length) return;
    const now = Date.now();
    let rearmed = 0;
    for (const entry of entries) {
      const ms = entry.at - now;
      if (ms < 0 && ms > -10 * 60000) {
        // Missed within last 10 min — fire immediately
        setTimeout(() => this.show(entry.title, entry.body, String(entry.id), entry.sound, 0.8), 800 + rearmed * 600);
        rearmed++;
      } else if (ms > 0) {
        await CapNotif.scheduleAt(entry.id, entry.title, entry.body, entry.at, entry.sound);
        const id = setTimeout(() => RFSound.play(entry.sound || 'bell', 0.8), ms);
        this._timers.push(id);
        rearmed++;
      }
    }
    if (rearmed) console.log(`[RFNotify] Re-armed ${rearmed} alerts`);
  }
};

// ─── Notification Settings Panel ──────────────────────────────────────────────
function NotifSettings({ settings, onChange, onClose, tasks, timezone }) {
  const [testing,  setTesting]  = React.useState(null);
  const [permInfo, setPermInfo] = React.useState('checking');
  const vol = (settings.volume ?? 80) / 100;

  // Check native permission status on open
  React.useEffect(() => {
    CapNotif.checkPermission().then(p => setPermInfo(p));
  }, []);

  const sounds = [
    { id:'chime',    label:'🎵 Chime',    desc:'Gentle 3-tone melody' },
    { id:'bell',     label:'🔔 Bell',     desc:'Double alert ring' },
    { id:'ringtone', label:'📱 Ringtone', desc:'Classic phone ring' },
    { id:'ping',     label:'✨ Ping',     desc:'Single soft note' },
  ];

  const handleTest = (soundId) => {
    setTesting(soundId);
    RFSound.getCtx();
    setTimeout(() => { RFSound.play(soundId, vol); }, 50);
    setTimeout(() => setTesting(null), 1800);
  };

  const handleRequestPerm = async () => {
    const result = await RFNotify.requestPermission();
    setPermInfo(result);
    onChange({ ...settings, enabled: result === 'granted' });
  };

  const Toggle = ({ label, sublabel, value, onToggle, disabled }) => (
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"11px 0", borderBottom:"1px solid #181830", opacity:disabled?0.4:1 }}>
      <div>
        <div style={{ fontSize:13, color:"#e8e6f0" }}>{label}</div>
        {sublabel && <div style={{ fontSize:11, color:"#6e6e8a", marginTop:2 }}>{sublabel}</div>}
      </div>
      <div onClick={disabled ? null : onToggle}
        style={{ width:44, height:26, borderRadius:13, background:value?"#10b981":"#252540", position:"relative", cursor:disabled?"not-allowed":"pointer", transition:"background 0.2s", flexShrink:0 }}>
        <div style={{ position:"absolute", top:3, left:value?20:3, width:20, height:20, borderRadius:"50%", background:"#fff", transition:"left 0.2s", boxShadow:"0 1px 4px rgba(0,0,0,.5)" }} />
      </div>
    </div>
  );

  // Next upcoming task countdown
  const now      = new Date();
  const todayStr = now.toLocaleDateString('en-CA', { timeZone: timezone });
  const upcoming = (tasks||[])
    .filter(t => t.startTime && taskAppliesToDate(t, todayStr))
    .map(t => ({ ...t, ms: new Date(todayStr+'T'+t.startTime+':00') - now }))
    .filter(t => t.ms > 0)
    .sort((a,b) => a.ms - b.ms)[0];
  const fmtCountdown = ms => { const m = Math.ceil(ms/60000); return m < 60 ? `${m}m` : `${Math.floor(m/60)}h ${m%60}m`; };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.75)", zIndex:1000, display:"flex", alignItems:"flex-end" }}

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
          <div style={{ fontFamily:"'Syne',sans-serif", fontSize:17, fontWeight:700, color:"#fff" }}>🔔 Notifications</div>
          <button onClick={onClose} style={{ background:"none", border:"none", color:"#6e6e8a", fontSize:20, cursor:"pointer", padding:4, lineHeight:1 }}>✕</button>
        </div>

        {/* Permission status card */}
        {permInfo !== 'granted' ? (
          <div style={{ background:"#1a080a", border:"1px solid #f43f5e44", borderRadius:10, padding:"14px 16px", marginBottom:16 }}>
            <div style={{ fontSize:13, color:"#f43f5e", fontWeight:600, marginBottom:6 }}>⚠️ Notifications not enabled</div>
            <div style={{ fontSize:12, color:"#a0a0bc", lineHeight:1.6, marginBottom:12 }}>
              iOS needs permission to show alerts when tasks start. Tap below to allow.
            </div>
            <button onClick={handleRequestPerm}
              style={{ background:"#f97316", border:"none", borderRadius:8, padding:"10px 20px", color:"#fff", fontSize:13, fontFamily:"inherit", cursor:"pointer", fontWeight:600, width:"100%" }}>
              Allow Notifications
            </button>
            <div style={{ marginTop:10, fontSize:11, color:"#525270", lineHeight:1.5 }}>
              If you already denied permission, go to:<br/>
              <b style={{color:"#a0a0bc"}}>iPhone Settings → RoutineFlow → Notifications → Allow</b>
            </div>
          </div>
        ) : (
          <div style={{ background:"#0d1a0d", border:"1px solid #10b98133", borderRadius:10, padding:"10px 14px", marginBottom:16, display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:20 }}>✅</span>
            <div>
              <div style={{ fontSize:12, color:"#10b981", fontWeight:600 }}>Notifications active</div>
              {upcoming && settings.enabled
                ? <div style={{ fontSize:11, color:"#6e6e8a", marginTop:2 }}>Next: {upcoming.name} in {fmtCountdown(upcoming.ms)}</div>
                : <div style={{ fontSize:11, color:"#6e6e8a", marginTop:2 }}>Alerts will fire natively on your iPhone</div>
              }
            </div>
          </div>
        )}

        {/* Master toggle */}
        <Toggle label="Notifications enabled" sublabel="Master switch for all task alerts"
          value={settings.enabled}
          onToggle={() => onChange({...settings, enabled:!settings.enabled})}
          disabled={permInfo !== 'granted'} />

        {/* Individual triggers */}
        <Toggle label="5-minute warning" sublabel="Alert 5 mins before task starts"
          value={settings.fiveMin}
          onToggle={() => onChange({...settings, fiveMin:!settings.fiveMin})}
          disabled={!settings.enabled || permInfo !== 'granted'} />

        <Toggle label="Task starts" sublabel="Alert when task begins"
          value={settings.onStart}
          onToggle={() => onChange({...settings, onStart:!settings.onStart})}
          disabled={!settings.enabled || permInfo !== 'granted'} />

        <Toggle label="Task ends" sublabel="Alert when task is done"
          value={settings.onEnd}
          onToggle={() => onChange({...settings, onEnd:!settings.onEnd})}
          disabled={!settings.enabled || permInfo !== 'granted'} />

        {/* Sound picker */}
        <div style={{ marginTop:16, paddingBottom:14, borderBottom:"1px solid #181830", opacity:settings.enabled && permInfo==='granted'?1:0.4 }}>
          <div style={{ fontSize:11, color:"#a0a0bc", letterSpacing:"1.5px", textTransform:"uppercase", marginBottom:12 }}>In-App Sound</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            {sounds.map(s => (
              <div key={s.id}
                style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:settings.sound===s.id?"#f9731620":"#131328", border:`1px solid ${settings.sound===s.id?"#f97316":"#242444"}`, borderRadius:9, padding:"9px 11px", cursor:"pointer" }}
                onClick={() => onChange({...settings, sound:s.id})}>
                <div>
                  <div style={{ fontSize:12, color:settings.sound===s.id?"#f97316":"#e8e6f0", fontWeight:settings.sound===s.id?600:400 }}>{s.label}</div>
                  <div style={{ fontSize:10, color:"#6e6e8a", marginTop:2 }}>{s.desc}</div>
                </div>
                <button onClick={e => { e.stopPropagation(); handleTest(s.id); }}
                  style={{ background:testing===s.id?"#10b981":"#1e1e38", border:`1px solid ${testing===s.id?"#10b981":"#2a2a45"}`, borderRadius:6, padding:"5px 9px", cursor:"pointer", color:testing===s.id?"#fff":"#a0a0bc", fontSize:13, flexShrink:0 }}>
                  {testing===s.id ? "♪" : "▶"}
                </button>
              </div>
            ))}
          </div>
        </div>

        {/* Volume */}
        <div style={{ paddingTop:14, paddingBottom:14, borderBottom:"1px solid #181830", opacity:settings.enabled && permInfo==='granted'?1:0.4 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div style={{ fontSize:11, color:"#a0a0bc", letterSpacing:"1.5px", textTransform:"uppercase" }}>In-App Volume</div>
            <div style={{ fontSize:14, color:"#f97316", fontWeight:700 }}>{settings.volume ?? 80}%</div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:16 }}>🔈</span>
            <input type="range" min="10" max="100" step="5" value={settings.volume ?? 80}
              onChange={e => onChange({...settings, volume:parseInt(e.target.value)})}
              style={{ flex:1, accentColor:"#f97316", cursor:"pointer" }} />
            <span style={{ fontSize:16 }}>🔊</span>
          </div>
          <div style={{ fontSize:10, color:"#525270", marginTop:6 }}>
            iOS lock screen alerts use your iPhone's system volume.
          </div>
        </div>

        {/* Telegram */}
        <TelegramSettings />

        {/* How it works */}
        <div style={{ marginTop:16, background:"#131328", borderRadius:9, padding:"11px 13px" }}>
          <div style={{ fontSize:11, color:"#a0a0bc", fontWeight:600, marginBottom:8 }}>How notifications work on iPhone</div>
          {[
            ["✅", "App open or background", "Native iOS alert fires with sound"],
            ["✅", "Lock screen",             "Full notification with banner + sound"],
            ["✅", "Telegram connected",       "Backup message even if app is force-closed"],
            ["⚠️", "App force-closed",         "Open app once each morning to arm alerts"],
          ].map(([icon, label, desc]) => (
            <div key={label} style={{ display:"flex", gap:8, alignItems:"flex-start", marginBottom:7 }}>
              <span style={{ fontSize:12, flexShrink:0 }}>{icon}</span>
              <div><span style={{ fontSize:11, color:"#e8e6f0", fontWeight:600 }}>{label}: </span><span style={{ fontSize:11, color:"#6e6e8a" }}>{desc}</span></div>
            </div>
          ))}
        </div>

        <button onClick={onClose} style={{ width:"100%", marginTop:16, background:"#f97316", border:"none", borderRadius:10, padding:"13px", color:"#fff", fontSize:14, fontFamily:"inherit", cursor:"pointer", fontWeight:700 }}>
          Done
        </button>
      </div>
    </div>
  );
}

function AuthScreen({ onAuth }) {
  const [mode,    setMode]    = useState("login");
  const [name,    setName]    = useState("");
  const [email,   setEmail]   = useState("");
  const [pass,    setPass]    = useState("");
  const [confirm, setConfirm] = useState("");
  const [error,   setError]   = useState("");
  const [loading, setLoading] = useState(false);
  const [showPw,  setShowPw]  = useState(false);

  const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

  // ── Detect if running inside Capacitor native app ─────────────────────────
  // window.Capacitor is injected by the Capacitor runtime on iOS/Android
  // On a normal browser this will be undefined → isCapacitor = false
  const isCapacitor = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());

  // ── Google Sign-In (browser only — not available in Capacitor) ────────────
  // Capacitor WebView does not support OAuth popups or redirects without
  // extra native plugins (cordova-plugin-inappbrowser etc.).
  // Solution: hide the Google button when running as a native app.
  // Users sign in with email/password on iPhone; Google works on the web version.
  const handleGoogle = async () => {
    setError(""); setLoading(true);
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await window._auth.signInWithRedirect(provider);
    } catch (e) {
      if (e.code === "auth/preview-mode") {
        setError("⚠️ Firebase only works when hosted online.");
      } else if (e.code === "auth/configuration-not-found" || e.code === "auth/invalid-api-key") {
        setError("Firebase is not configured yet.");
      } else {
        setError(e.message || "Google sign-in failed. Please try again.");
      }
      setLoading(false);
    }
  };

  // ── Email / Password ───────────────────────────────────────────────────────
  const handleSubmit = async () => {
    setError("");
    if (!emailValid)        return setError("Please enter a valid email address.");
    if (pass.length < 6)    return setError("Password must be at least 6 characters.");
    if (mode === "signup") {
      if (!name.trim())     return setError("Please enter your name.");
      if (pass !== confirm) return setError("Passwords do not match.");
    }
    setLoading(true);
    try {
      if (mode === "signup") {
        const cred = await window._auth.createUserWithEmailAndPassword(email.trim(), pass);
        await cred.user.updateProfile({ displayName: name.trim() });
      } else {
        await window._auth.signInWithEmailAndPassword(email.trim(), pass);
      }
    } catch (e) {
      if (e.code === "auth/email-already-in-use")    setError("An account with this email already exists.");
      else if (e.code === "auth/user-not-found")     setError("No account found with this email.");
      else if (e.code === "auth/wrong-password")     setError("Incorrect password.");
      else if (e.code === "auth/invalid-credential") setError("Incorrect email or password.");
      else if (e.code === "auth/configuration-not-found" || e.code === "auth/invalid-api-key")
        setError("Firebase is not configured yet.");
      else setError(e.message || "Something went wrong. Please try again.");
    }
    setLoading(false);
  };

  const inputStyle = { width:"100%", background:"#0f0f1e", border:"1px solid #242444", borderRadius:9, padding:"13px 15px", color:"#fff", fontSize:14, fontFamily:"'DM Mono',monospace", outline:"none", boxSizing:"border-box" };

      <div className="auth-card" style={{ width:"100%", maxWidth:420 }}>
        <div style={{ textAlign:"center", marginBottom:36 }}>
          <div style={{ fontFamily:"'Syne',sans-serif", fontSize:26, fontWeight:800, letterSpacing:"-0.5px", color:"#fff", marginBottom:6 }}>ROUTINEFLOW</div>
          <div style={{ fontSize:11, color:"#6e6e8a", letterSpacing:"2px", textTransform:"uppercase" }}>Build your best day, every day</div>
        </div>
        <div style={{ background:"#0e0e1d", border:"1px solid #1e1e38", borderRadius:16, padding:"32px 28px" }}>
          <div style={{ display:"flex", background:"#0a0a18", borderRadius:10, padding:4, marginBottom:24, border:"1px solid #1a1a30" }}>
            {["login","signup"].map(m => (
              <button key={m} onClick={() => { setMode(m); setError(""); }}
                style={{ flex:1, padding:"9px", border:"none", borderRadius:7, cursor:"pointer", fontFamily:"inherit", fontSize:12, letterSpacing:"1px", textTransform:"uppercase", fontWeight:500, background:mode===m?"#f97316":"transparent", color:mode===m?"#fff":"#6e6e8a", transition:"all 0.2s" }}>
                {m === "login" ? "Sign In" : "Sign Up"}

          </div>

          {isCapacitor ? (

              <div style={{ fontSize:13, color:"#10b981", fontWeight:600, marginBottom:4 }}>📱 Sign in with email & password</div>

                <svg width="20" height="20" viewBox="0 0 24 24">
                  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                {loading ? "Redirecting to Google…" : "Continue with Google"}
              </button>
              <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:18 }}>
                <div style={{ flex:1, height:1, background:"#1a1a30" }} />
                <span style={{ fontSize:11, color:"#525270", letterSpacing:"1px" }}>OR</span>
                <div style={{ flex:1, height:1, background:"#1a1a30" }} />
              </div>
            </>
          )}
          <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
            {mode === "signup" && (
              <div>
                <div style={{ fontSize:10, color:"#a0a0bc", letterSpacing:"1.5px", textTransform:"uppercase", marginBottom:6 }}>Full Name</div>
                <input className="auth-input" style={inputStyle} type="text" placeholder="Your name" value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key==="Enter" && handleSubmit()} />
              </div>
            )}
            <div>
              <div style={{ fontSize:10, color:"#a0a0bc", letterSpacing:"1.5px", textTransform:"uppercase", marginBottom:6 }}>Email</div>
              <input className="auth-input" style={inputStyle} type="email" placeholder="you@example.com" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key==="Enter" && handleSubmit()} />
            </div>
            <div>
              <div style={{ fontSize:10, color:"#a0a0bc", letterSpacing:"1.5px", textTransform:"uppercase", marginBottom:6 }}>Password</div>
              <div style={{ position:"relative" }}>
                <input className="auth-input" style={inputStyle} type={showPw?"text":"password"} placeholder="Min. 6 characters" value={pass} onChange={e => setPass(e.target.value)} onKeyDown={e => e.key==="Enter" && handleSubmit()} />
                <button onClick={() => setShowPw(o=>!o)} style={{ position:"absolute", right:13, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"#6e6e8a", cursor:"pointer", fontSize:11, fontFamily:"inherit" }}>{showPw ? "HIDE" : "SHOW"}</button>
              </div>
            </div>
            {mode === "signup" && (
              <div>
                <div style={{ fontSize:10, color:"#a0a0bc", letterSpacing:"1.5px", textTransform:"uppercase", marginBottom:6 }}>Confirm Password</div>
                <input className="auth-input" style={inputStyle} type={showPw?"text":"password"} placeholder="Repeat password" value={confirm} onChange={e => setConfirm(e.target.value)} onKeyDown={e => e.key==="Enter" && handleSubmit()} />
              </div>
            )}
          </div>
          {error && <div style={{ background:"#1a080a", border:"1px solid #f43f5e44", borderRadius:8, padding:"10px 13px", marginTop:14, fontSize:12, color:"#f87090", lineHeight:1.6 }}>{error}</div>}
          <button onClick={handleSubmit} disabled={loading}
            style={{ width:"100%", marginTop:18, padding:"13px", background:loading?"#7a3a10":"#f97316", border:"none", borderRadius:9, color:"#fff", fontSize:13, fontFamily:"inherit", fontWeight:500, letterSpacing:"1px", cursor:loading?"not-allowed":"pointer", textTransform:"uppercase" }}>
            {loading ? "Please wait…" : mode === "login" ? "Sign In →" : "Create Account →"}
          </button>
          <div style={{ textAlign:"center", marginTop:18, fontSize:12, color:"#6e6e8a" }}>
            {mode === "login"
              ? <>Don't have an account? <span onClick={() => { setMode("signup"); setError(""); }} style={{ color:"#f97316", cursor:"pointer" }}>Sign up free</span></>
              : <>Already have an account? <span onClick={() => { setMode("login"); setError(""); }} style={{ color:"#f97316", cursor:"pointer" }}>Sign in</span></>
            }
          </div>
        </div>
        <div style={{ textAlign:"center", marginTop:20, fontSize:10, color:"#525270", lineHeight:1.7 }}>
          {window._firebaseReady ? "Secured by Firebase · Data synced across all your devices" : "⚠️ Preview mode — Firebase requires hosting to work fully."}
        </div>
      </div>
    </div>
  );
}

// ─── App Root ─────────────────────────────────────────────────────────────────
function App() {
  const [tab,          setTab]          = useState("today");
  const [tasks,        setTasks]        = useState(DEFAULT_TASKS);
  const [logs,         setLogs]         = useState({});
  const [goals,        setGoals]        = useState([]);
  const [timezone,     setTimezone]     = useState("Europe/Berlin");
  const [modal,        setModal]        = useState(null);
  const [editTask,     setEditTask]     = useState(null);
  const [loaded,       setLoaded]       = useState(false);
  const [tzOpen,       setTzOpen]       = useState(false);
  const [selectedDate, setSelectedDate] = useState(null);
  const [user,         setUser]         = useState(null);
  const [authChecked,  setAuthChecked]  = useState(false);
  const clock = useClock(timezone);
  const [syncReady, setSyncReady] = useState(false);

  const defaultNotifSettings = { enabled:true, fiveMin:true, onStart:true, onEnd:false, sound:'bell', volume:80 };
  const [notifPermission,  setNotifPermission]  = useState('default'); // updated async on mount
  const [notifSettings,    setNotifSettings]    = useState(() => { try { return JSON.parse(localStorage.getItem('rf_notif_settings')) || defaultNotifSettings; } catch { return defaultNotifSettings; } });
  const [showNotifBanner,  setShowNotifBanner]  = useState(false);
  const [showNotifPanel,   setShowNotifPanel]   = useState(false);

  // Check native permission status on mount and after login
  useEffect(() => {
    if (!user) return;
    CapNotif.checkPermission().then(perm => {
      setNotifPermission(perm);
      if (perm !== 'granted') {
        const dismissed = localStorage.getItem('rf_notif_dismissed');
        if (!dismissed) setTimeout(() => setShowNotifBanner(true), 2500);
      }
    });
  }, [user]);
  useEffect(() => { localStorage.setItem('rf_notif_settings', JSON.stringify(notifSettings)); }, [notifSettings]);
  useEffect(() => {
    const handleVisibility = () => { if (document.visibilityState === 'visible' && user && notifSettings.enabled) setTimeout(() => RFNotify.rearmFromStorage(), 300); };
    document.addEventListener('visibilitychange', handleVisibility);
    return () => document.removeEventListener('visibilitychange', handleVisibility);
  }, [user, notifSettings.enabled]);

  const tkey = todayKey(timezone);

  useEffect(() => {
    if (!user || !syncReady) return;
    const todayTasks2 = tasks.filter(t => taskAppliesToDate(t, tkey));
    RFNotify.scheduleTasks(todayTasks2, timezone, notifSettings);
    return () => RFNotify.clearAll();
  }, [tasks, timezone, notifSettings, user, syncReady]);

  useEffect(() => {
    const unsubscribe = window._auth.onAuthStateChanged(async (fbUser) => {
      setSyncReady(false);
      if (fbUser) {
        const displayName = fbUser.displayName || fbUser.email.split("@")[0];
        setUser({ name: displayName, email: fbUser.email, uid: fbUser.uid });
        store.setUid(fbUser.uid);
        let t, l, g, tz;
        try { [t, l, g, tz] = await Promise.all([store.get("rf_tasks"), store.get("rf_logs"), store.get("rf_goals"), store.get("rf_tz")]); } catch(e) {}
        if (t) setTasks(t); if (l) setLogs(l); if (g) setGoals(g); if (tz) setTimezone(tz);
      } else {
        setUser(null); store.setUid(null);
        setTasks(DEFAULT_TASKS); setLogs({}); setGoals([]); setTimezone("Europe/Berlin");
      }
      setLoaded(true); setAuthChecked(true);
      setTimeout(() => setSyncReady(true), 500);
    });
    return () => unsubscribe();
  }, []);

  useEffect(() => { if (syncReady && user) store.set("rf_tasks", tasks); }, [tasks, syncReady, user]);
  useEffect(() => { if (syncReady && user) store.set("rf_logs",  logs);  }, [logs,  syncReady, user]);
  useEffect(() => { if (syncReady && user) store.set("rf_goals", goals); }, [goals, syncReady, user]);
  useEffect(() => { if (syncReady && user) store.set("rf_tz", timezone); }, [timezone, syncReady, user]);

  const viewKey        = selectedDate || tkey;
  const viewTasks      = tasks.filter(t => taskAppliesToDate(t, viewKey)).sort((a,b) => (a.startTime||"00:00").localeCompare(b.startTime||"00:00"));
  const viewLog        = logs[viewKey] || {};
  const completedToday = viewTasks.filter(t => viewLog[t.id]).length;
  const totalToday     = viewTasks.length;
  const pct            = totalToday ? Math.round((completedToday / totalToday) * 100) : 0;
  const todayTasks     = tasks.filter(t => taskAppliesToDate(t, tkey));
  const todayLog       = logs[tkey] || {};
  const todayPct       = todayTasks.length ? Math.round(todayTasks.filter(t=>todayLog[t.id]).length / todayTasks.length * 100) : 0;

  const toggleTask = useCallback((taskId, dateKey) => {
    const task  = tasks.find(t => t.id === taskId);
    const dkey  = dateKey || tkey;
    const wasOn = !!(logs[dkey]?.[taskId]);
    const nowOn = !wasOn;
    setLogs(prev => ({ ...prev, [dkey]: { ...(prev[dkey]||{}), [taskId]: nowOn } }));
    if (dkey === tkey && task?.linkedMilestone?.goalId && task?.linkedMilestone?.milestoneId) {
      const { goalId, milestoneId } = task.linkedMilestone;
      setGoals(prev => prev.map(g => {
        if (g.id !== goalId) return g;
        const milestones = (g.milestones || []).map(m => m.id === milestoneId ? { ...m, done: nowOn } : m);
        return { ...g, milestones, current: milestones.filter(m => m.done).length };
      }));
    }
  }, [tkey, tasks, logs]);

  const streak = (() => {
    let s = 0; const d = new Date();
    for (let i = 0; i < 366; i++) {
      const key = d.toLocaleDateString("en-CA", { timeZone: timezone });
      const applicable = tasks.filter(t => taskAppliesToDate(t, key));
      const done = applicable.filter(t => (logs[key]||{})[t.id]).length;
      if (done === 0 && key !== tkey) break;
      if (done > 0) s++;
      d.setDate(d.getDate() - 1);
    }
    return s;
  })();

  const tzLabel = TIMEZONES.find(t => t.tz === timezone)?.label || timezone;
  const tabs = [
    { id:"today",   label:"Schedule", icon:"list"     },
    { id:"history", label:"Calendar", icon:"calendar" },
    { id:"stats",   label:"Stats",    icon:"chart"    },
    { id:"goals",   label:"Goals",    icon:"target"   },
  ];
  const handleLogout = () => window._auth.signOut();

  if (!authChecked) return (
    <div style={{ minHeight:"100vh", background:"#080810", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'DM Mono',monospace" }}>
      <div style={{ textAlign:"center" }}>
        <div style={{ fontFamily:"'Syne',sans-serif", fontSize:22, fontWeight:800, color:"#fff", marginBottom:8 }}>ROUTINEFLOW</div>
        <div style={{ fontSize:11, color:"#525270", letterSpacing:"2px" }}>LOADING…</div>
      </div>
    </div>
  );

  if (!user) return <AuthScreen />;

  const initials = (user.name || user.email).split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);

  return (
    <div style={{ fontFamily:"'DM Mono','Courier New',monospace", background:"#080810", minHeight:"100vh", color:"#e8e6f0" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:#080810} ::-webkit-scrollbar-thumb{background:#232340;border-radius:2px}
        .task-row{transition:background 0.18s} .task-row:hover{background:#0e0e20!important}
        .tab-btn{transition:color 0.18s,border-color 0.18s} .tab-btn:hover{color:#fff!important}
        .btn-glow:hover{box-shadow:0 0 18px rgba(249,115,22,0.35)}
        input,select,textarea{font-family:'DM Mono',monospace!important}
        .progress-bar{transition:width 1s cubic-bezier(0.4,0,0.2,1)}
        .fade-in{animation:fadeIn 0.28s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
        .tz-drop{position:absolute;top:calc(100% + 6px);right:0;background:#0c0c1a;border:1px solid #242444;border-radius:10px;padding:6px;z-index:400;min-width:195px;max-height:270px;overflow-y:auto;box-shadow:0 10px 36px rgba(0,0,0,0.55)}
        .tz-item{padding:8px 12px;border-radius:6px;cursor:pointer;font-size:12px;color:#c0bdd8;transition:background 0.13s,color 0.13s;display:flex;justify-content:space-between;align-items:center}
        .tz-item:hover{background:#1a1a30;color:#fff} .tz-item.sel{background:#f97316;color:#fff;font-weight:500}
        .chip{padding:5px 11px;border-radius:20px;border:1px solid #2a2a48;font-size:11px;cursor:pointer;transition:all 0.13s;background:transparent;color:#b0b0c8;font-family:'DM Mono',monospace;letter-spacing:.5px}
        .chip.on{background:#f97316;border-color:#f97316;color:#fff} .chip:hover:not(.on){border-color:#f97316;color:#f97316}
        .dchip{width:32px;height:32px;border-radius:6px;border:1px solid #2a2a48;font-size:11px;cursor:pointer;transition:all 0.13s;background:transparent;color:#b0b0c8;font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center}
        .dchip.on{background:#f97316;border-color:#f97316;color:#fff} .dchip:hover:not(.on){border-color:#f97316;color:#f97316}
        .now-pill{display:inline-flex;align-items:center;margin-left:8px;font-size:10px;color:#f97316;background:#f9731622;padding:2px 7px;border-radius:3px;letter-spacing:.8px;animation:pulse 2s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .shimmer-bar{background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);background-size:200% 100%;animation:shimmer 1.8s infinite}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .ms-row{transition:background 0.15s;border-radius:8px} .ms-row:hover{background:#12122a!important}
        .goal-card{transition:border-color 0.2s}
        .overdue-badge{display:inline-flex;align-items:center;gap:3px;background:#f43f5e22;color:#f43f5e;border:1px solid #f43f5e44;border-radius:4px;padding:2px 7px;font-size:9px;letter-spacing:1px;text-transform:uppercase;font-weight:500}
        .ms-progress-track{background:#13132a;border-radius:3px;height:4px;overflow:hidden;margin-top:7px}
        .heat-cell{border-radius:4px;transition:transform 0.1s;cursor:default} .heat-cell:hover{transform:scale(1.15)}
      `}</style>

      <div style={{ borderBottom:"1px solid #181830", background:"#0b0b18" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"11px 14px 6px" }}>
          <div>
            <div style={{ fontFamily:"'Syne',sans-serif", fontSize:19, fontWeight:800, letterSpacing:"-0.5px", color:"#fff", lineHeight:1 }}>ROUTINEFLOW</div>
            <div style={{ fontSize:9, color:"#a0a0bc", letterSpacing:"1.5px", textTransform:"uppercase", marginTop:3 }}>
              {new Date().toLocaleDateString("en-GB",{ timeZone:timezone, weekday:"short", day:"numeric", month:"short" })}
            </div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <div title={user.email} style={{ width:30, height:30, borderRadius:"50%", background:"linear-gradient(135deg,#f97316,#f43f5e)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:"#fff", flexShrink:0 }}>{initials}</div>
            <button onClick={() => setShowNotifPanel(true)}
              style={{ flexShrink:0, background: notifPermission==='granted' && notifSettings.enabled ? "#10b98114":"#1a1a2e", border:`1px solid ${notifPermission==='granted' && notifSettings.enabled ? "#10b98155":"#252545"}`, borderRadius:7, padding:"4px 8px", cursor:"pointer", fontSize:15 }}>
              {notifPermission==='granted' && notifSettings.enabled ? "🔔" : "🔕"}
            </button>
            <button title={syncReady ? "Tap to reload" : "Loading…"}
              onClick={async () => {
                if (!user) return; setSyncReady(false); store.setUid(user.uid);
                try { const [t,l,g,tz] = await Promise.all([store.get("rf_tasks"),store.get("rf_logs"),store.get("rf_goals"),store.get("rf_tz")]); if(t)setTasks(t);if(l)setLogs(l);if(g)setGoals(g);if(tz)setTimezone(tz); } catch(e){}
                setTimeout(() => setSyncReady(true), 500);
              }}
              style={{ display:"flex", alignItems:"center", gap:5, background:syncReady?"#10b98114":"#f9731614", border:`1px solid ${syncReady?"#10b98155":"#f9731655"}`, borderRadius:7, padding:"5px 10px", cursor:"pointer", fontFamily:"inherit", flexShrink:0 }}>
              <span style={{ fontSize:12 }}>{syncReady ? "☁" : "↻"}</span>
              <span style={{ fontSize:9, fontWeight:600, color:syncReady?"#10b981":"#f97316", letterSpacing:".5px" }}>{syncReady ? "SYNC" : "…"}</span>
            </button>
            <button onClick={handleLogout}
              style={{ display:"flex", alignItems:"center", background:"none", border:"1px solid #2a2a45", borderRadius:7, padding:"5px 10px", color:"#6e6e8a", fontSize:9, fontWeight:600, fontFamily:"inherit", cursor:"pointer", letterSpacing:".5px", flexShrink:0 }}
              onMouseEnter={e=>{e.currentTarget.style.color="#f43f5e";e.currentTarget.style.borderColor="#f43f5e55";}}
              onMouseLeave={e=>{e.currentTarget.style.color="#6e6e8a";e.currentTarget.style.borderColor="#2a2a45";}}>
              OUT
            </button>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8, padding:"0 14px 11px" }}>
          <div style={{ position:"relative", flex:1, minWidth:0 }}>
            <button onClick={() => setTzOpen(o => !o)}
              style={{ display:"flex", alignItems:"center", gap:7, cursor:"pointer", background:"#0f0f1e", border:"1px solid #1e1e38", borderRadius:8, padding:"7px 11px", outline:"none", color:"inherit", fontFamily:"inherit", width:"100%" }}>
              <Icon name="clock" size={13} />
              <span style={{ fontSize:13, fontWeight:500, color:"#fff", letterSpacing:"1.5px", fontVariantNumeric:"tabular-nums", flexShrink:0 }}>{clock}</span>
              <span style={{ fontSize:10, color:"#b0b0c8", flex:1, textAlign:"left", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{tzLabel}</span>
              <Icon name="chev" size={11} />
            </button>
            {tzOpen && (
              <div className="tz-drop">
                <div style={{ fontSize:9, color:"#a0a0bc", letterSpacing:"2px", padding:"4px 12px 8px", textTransform:"uppercase" }}>Timezone</div>
                {TIMEZONES.map(t => (
                  <div key={t.tz} className={`tz-item${timezone===t.tz?" sel":""}`} onClick={() => { setTimezone(t.tz); setTzOpen(false); }}>
                    <span>{t.label}</span>
                    <span style={{ fontSize:10, opacity:.65, fontVariantNumeric:"tabular-nums" }}>{new Date().toLocaleTimeString("en-GB",{ timeZone:t.tz, hour:"2-digit", minute:"2-digit" })}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div style={{ width:1, height:22, background:"#252540", flexShrink:0 }} />
          <div style={{ textAlign:"center", flexShrink:0 }}>
            <div style={{ display:"flex", alignItems:"center", gap:3, color:"#f97316", fontWeight:600, fontSize:13, lineHeight:1 }}><Icon name="flame" size={12} />{streak}</div>
            <div style={{ fontSize:8, color:"#6e6e8a", letterSpacing:"1px", marginTop:2 }}>STREAK</div>
          </div>
          <div style={{ width:1, height:22, background:"#252540", flexShrink:0 }} />
          <div style={{ textAlign:"center", flexShrink:0 }}>
            <div style={{ color:"#fff", fontWeight:600, fontSize:13, lineHeight:1 }}>{todayPct}%</div>
            <div style={{ fontSize:8, color:"#6e6e8a", letterSpacing:"1px", marginTop:2 }}>TODAY</div>
          </div>
        </div>
      </div>

      {tzOpen && <div style={{ position:"fixed", inset:0, zIndex:399 }} onClick={() => setTzOpen(false)} />}

      {showNotifBanner && notifPermission !== 'granted' && (
        <div style={{ maxWidth:720, margin:"12px auto 0", padding:"0 15px" }}>
          <NotifBanner onGranted={() => { setNotifPermission('granted'); setShowNotifBanner(false); }} onDismiss={() => { setShowNotifBanner(false); localStorage.setItem('rf_notif_dismissed', '1'); }} />
        </div>
      )}
      {showNotifPanel && <NotifSettings settings={notifSettings} onChange={s => setNotifSettings(s)} onClose={() => setShowNotifPanel(false)} tasks={tasks} timezone={timezone} />}

      <div style={{ display:"flex", borderBottom:"1px solid #181830", background:"#0b0b18", padding:"0 18px", overflowX:"auto" }}>
        {tabs.map(t => (
          <button key={t.id} className="tab-btn" onClick={() => setTab(t.id)}
            style={{ padding:"11px 13px", background:"none", border:"none", cursor:"pointer", fontSize:11, letterSpacing:"1px", textTransform:"uppercase", fontFamily:"inherit", display:"flex", alignItems:"center", gap:6, borderBottom:tab===t.id?"2px solid #f97316":"2px solid transparent", color:tab===t.id?"#fff":"#a0a0bc", marginBottom:-1, whiteSpace:"nowrap" }}>
            <Icon name={t.icon} size={12} /> {t.label}
          </button>
        ))}
      </div>

      <div style={{ maxWidth:720, margin:"0 auto", padding:"18px 15px" }} className="fade-in" key={tab}>
        {tab==="today"   && <TodayView tasks={viewTasks} allTasks={tasks} viewLog={viewLog} viewKey={viewKey} todayKey={tkey} selectedDate={selectedDate} setSelectedDate={setSelectedDate} toggleTask={toggleTask} completedToday={completedToday} totalToday={totalToday} pct={pct} onAddTask={() => setModal("task")} onEditTask={t => { setEditTask(t); setModal("task"); }} onDeleteTask={id => setTasks(p => p.filter(t => t.id!==id))} timezone={timezone} goals={goals} />}
        {tab==="history" && <HistoryView tasks={tasks} logs={logs} timezone={timezone} setSelectedDate={setSelectedDate} setTab={setTab} />}
        {tab==="stats"   && <StatsView tasks={tasks} logs={logs} timezone={timezone} goals={goals} />}
        {tab==="goals"   && <GoalsView goals={goals} setGoals={setGoals} onAdd={() => setModal("goal")} />}
      </div>

      {modal==="task" && <TaskModal key={editTask?.id || "new"} onClose={() => { setModal(null); setEditTask(null); }} onSave={t => { setTasks(p => resolveOverlaps(editTask ? p.map(x => x.id===editTask.id ? t : x) : [...p, t])); setModal(null); setEditTask(null); }} colorOptions={COLORS} initial={editTask} allTasks={tasks} goals={goals} />}
      {modal==="goal" && <GoalModal onClose={() => setModal(null)} onSave={g => { setGoals(p => [...p, g]); setModal(null); }} />}
    </div>
  );
}

// ─── Today View ───────────────────────────────────────────────────────────────
function TodayView({ tasks, allTasks, viewLog, viewKey, todayKey, selectedDate, setSelectedDate, toggleTask, completedToday, totalToday, pct, onAddTask, onEditTask, onDeleteTask, timezone, goals }) {
  const doneMins  = tasks.filter(t => viewLog[t.id]).reduce((s,t) => s+t.duration, 0);
  const totalMins = tasks.reduce((s,t) => s+t.duration, 0);
  const isToday   = viewKey === todayKey;
  const isFuture  = viewKey > todayKey;
  const isPast    = viewKey < todayKey;

  const shiftDate = (delta) => {
    const d = new Date(viewKey + "T00:00:00"); d.setDate(d.getDate() + delta);
    const next = d.toLocaleDateString("en-CA");
    setSelectedDate(next === todayKey ? null : next);
  };

  const dateLabel = (() => {
    if (isToday) return "TODAY";
    const d = new Date(viewKey + "T00:00:00"); const t = new Date(todayKey + "T00:00:00");
    const diff = Math.round((d - t) / 864e5);
    if (diff === 1) return "TOMORROW"; if (diff === -1) return "YESTERDAY";
    return d.toLocaleDateString("en-GB", { weekday:"short", day:"numeric", month:"short", year:"numeric" }).toUpperCase();
  })();

  const fullDateDisplay = (() => { const d = new Date(viewKey + "T00:00:00"); return d.toLocaleDateString("en-GB", { weekday:"long", day:"numeric", month:"long", year:"numeric" }); })();
  const nowMins = (() => { const n = new Date(); return n.getHours()*60+n.getMinutes(); })();

  return (
    <div>
      <div style={{ background:"#0e0e1d", border:"1px solid #181830", borderRadius:12, padding:"12px 16px", marginBottom:14, display:"flex", alignItems:"center", gap:10 }}>
        <button onClick={() => shiftDate(-1)} style={{ background:"#13132a", border:"1px solid #525270", borderRadius:7, padding:"7px 11px", color:"#c0bdd8", cursor:"pointer", fontSize:14, flexShrink:0, lineHeight:1 }}>‹</button>
        <div style={{ flex:1, textAlign:"center", position:"relative" }}>
          <div style={{ fontSize:11, letterSpacing:"2px", color: isFuture?"#3b82f6": isPast?"#b0b0c8":"#f97316", textTransform:"uppercase", fontWeight:600, marginBottom:2 }}>{isFuture && "▸ "}{isPast && "◂ "}{dateLabel}</div>
          <div style={{ fontSize:12, color:"#a0a0bc" }}>{fullDateDisplay}</div>
          <input type="date" value={viewKey} onChange={e => { const v = e.target.value; setSelectedDate(v === todayKey ? null : v); }} style={{ position:"absolute", inset:0, opacity:0, cursor:"pointer", width:"100%", height:"100%" }} />
        </div>
        <button onClick={() => shiftDate(1)} style={{ background:"#13132a", border:"1px solid #525270", borderRadius:7, padding:"7px 11px", color:"#c0bdd8", cursor:"pointer", fontSize:14, flexShrink:0, lineHeight:1 }}>›</button>
        {!isToday && <button onClick={() => setSelectedDate(null)} style={{ background:"#f97316", border:"none", borderRadius:7, padding:"7px 12px", color:"#fff", cursor:"pointer", fontSize:10, letterSpacing:"1px", fontFamily:"inherit", flexShrink:0, whiteSpace:"nowrap" }}>↩ TODAY</button>}
      </div>

      {isFuture && <div style={{ background:"#0d1a2e", border:"1px solid #3b82f633", borderRadius:9, padding:"9px 14px", marginBottom:14, display:"flex", alignItems:"center", gap:8 }}><span style={{ fontSize:16 }}>📅</span><div style={{ fontSize:12, color:"#3b82f6" }}>Viewing future schedule — tasks shown based on their repeat rules.</div></div>}
      {isPast   && <div style={{ background:"#0d0d1c", border:"1px solid #6e6e8a", borderRadius:9, padding:"9px 14px", marginBottom:14, display:"flex", alignItems:"center", gap:8 }}><span style={{ fontSize:16 }}>📜</span><div style={{ fontSize:12, color:"#b0b0c8" }}>Viewing past schedule — you can retroactively mark tasks as done.</div></div>}

      <div style={{ background:"linear-gradient(135deg,#0d0d1e 0%,#0f0f26 100%)", border:`1px solid ${isFuture?"#3b82f630":isPast?"#6e6e8a":"#181830"}`, borderRadius:12, padding:20, marginBottom:18 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:14 }}>
          <div>
            <div style={{ fontFamily:"'Syne',sans-serif", fontSize:46, fontWeight:800, lineHeight:1, color:pct===100?"#10b981":isFuture?"#3b82f6":"#fff" }}>{pct}<span style={{ fontSize:20, color:"#a0a0bc" }}>%</span></div>
            <div style={{ fontSize:11, color:"#a0a0bc", letterSpacing:"2px", marginTop:4 }}>{completedToday}/{totalToday} TASKS · {fmtMins(doneMins)} / {fmtMins(totalMins)}</div>
          </div>
          {pct===100 && <div style={{ background:"#10b98116", border:"1px solid #10b98138", borderRadius:8, padding:"7px 13px", fontSize:11, color:"#10b981", letterSpacing:"1px" }}>✦ COMPLETE</div>}
        </div>
        <div style={{ background:"#13132a", borderRadius:4, height:6, overflow:"hidden" }}>
          <div className="progress-bar" style={{ height:"100%", width:`${pct}%`, background:pct===100?"#10b981":isFuture?"#3b82f6":"linear-gradient(90deg,#f97316,#f43f5e)", borderRadius:4 }} />
        </div>
      </div>

      <DayTimeline tasks={tasks} nowMins={isToday ? nowMins : null} />

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:13 }}>
        <div style={{ fontSize:11, letterSpacing:"2px", color:"#a0a0bc", textTransform:"uppercase" }}>{isToday ? "Today's" : isFuture ? "Planned" : "Past"} Schedule</div>
        <button onClick={onAddTask} className="btn-glow" style={{ display:"flex", alignItems:"center", gap:6, background:"#f97316", border:"none", borderRadius:6, padding:"6px 14px", color:"#fff", fontSize:11, fontFamily:"inherit", cursor:"pointer", letterSpacing:"1px" }}>
          <Icon name="plus" size={12} /> ADD TASK
        </button>
      </div>

      {tasks.length === 0 && <div style={{ textAlign:"center", padding:"50px 20px", color:"#525270", fontSize:13 }}>No tasks scheduled for this day.</div>}

      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {tasks.map(task => {
          const done = !!viewLog[task.id];
          const tMins = task.startTime ? parseInt(task.startTime)*60 + parseInt(task.startTime.split(":")[1]) : null;
          const isActive = isToday && tMins!==null && nowMins>=tMins && nowMins<tMins+task.duration;
          return (
            <div key={task.id} className="task-row"
              style={{ background:done?"#0c0c1c":"#0e0e1d", border:`1px solid ${isActive&&!done?task.color+"70":done?task.color+"28":"#181830"}`, borderRadius:10, padding:"11px 12px", cursor:"pointer", position:"relative", overflow:"hidden" }}
              onClick={() => toggleTask(task.id, viewKey)}>
              {isActive && !done && <div className="shimmer-bar" style={{ position:"absolute", inset:0, pointerEvents:"none", opacity:.06 }} />}
              {isActive && !done && <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:`linear-gradient(90deg,transparent,${task.color},transparent)` }} />}
              {done && <div style={{ position:"absolute", inset:0, background:task.color+"06", pointerEvents:"none" }} />}
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:22, height:22, borderRadius:6, border:`2px solid ${done?task.color:"#6e6e8a"}`, background:done?task.color:"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, color:"#fff" }}>{done && <Icon name="check" size={11} />}</div>
                <div style={{ width:3, height:26, background:task.color, borderRadius:2, flexShrink:0, opacity:done?0.35:1 }} />
                <div style={{ flex:1, minWidth:0, fontSize:14, color:done?"#a0a0bc":"#e8e6f0", textDecoration:done?"line-through":"none", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                  {task.name}{isActive && !done && <span className="now-pill">NOW</span>}
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:4, flexShrink:0 }}>
                  <span style={{ background:"#13132a", padding:"2px 7px", borderRadius:4, fontSize:10, color:"#b0b0c8", whiteSpace:"nowrap" }}>{fmtMins(task.duration)}</span>
                  <button onClick={e => { e.stopPropagation(); onEditTask(task); }} style={{ background:"#13132a", border:"1px solid #232348", borderRadius:6, cursor:"pointer", color:"#a0a0bc", padding:"4px 6px", display:"flex", alignItems:"center" }} onMouseEnter={e=>e.currentTarget.style.color="#f97316"} onMouseLeave={e=>e.currentTarget.style.color="#a0a0bc"}><Icon name="edit" size={12} /></button>
                  <button onClick={e => { e.stopPropagation(); onDeleteTask(task.id); }} style={{ background:"#13132a", border:"1px solid #232348", borderRadius:6, cursor:"pointer", color:"#a0a0bc", padding:"4px 6px", display:"flex", alignItems:"center" }} onMouseEnter={e=>e.currentTarget.style.color="#f43f5e"} onMouseLeave={e=>e.currentTarget.style.color="#a0a0bc"}><Icon name="trash" size={12} /></button>
                </div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:6, paddingLeft:32, flexWrap:"wrap" }}>
                {task.startTime && <span style={{ color:"#b0b0c8", display:"flex", alignItems:"center", gap:3, fontSize:11 }}><Icon name="clock" size={9} /> {fmt12(task.startTime)}<span style={{ color:"#6e6e8a" }}>–{fmt12(endTime(task.startTime,task.duration))}</span></span>}
                <span style={{ fontSize:11, color:"#6e6e8a" }}>{task.category}</span>
                {task.linkedMilestone?.goalId && (() => {
                  const g = goals?.find(x => x.id === task.linkedMilestone.goalId);
                  return g ? <span style={{ display:"flex", alignItems:"center", gap:3, background:"#f9731618", color:"#f97316", padding:"2px 6px", borderRadius:4, fontSize:10 }}><Icon name="flag" size={9} /> {g.name}</span> : null;
                })()}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── History View ─────────────────────────────────────────────────────────────
function HistoryView({ tasks, logs, timezone, setSelectedDate, setTab }) {
  const now = new Date();
  const [vy, setVy] = useState(now.getFullYear());
  const [vm, setVm] = useState(now.getMonth());
  const [hoveredKey, setHoveredKey] = useState(null);
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const firstDay = new Date(vy,vm,1).getDay();
  const daysInMonth = new Date(vy,vm+1,0).getDate();
  const todayStr = todayKey(timezone);
  const prevMonth = () => { if(vm===0){setVy(y=>y-1);setVm(11);}else setVm(m=>m-1); };
  const nextMonth = () => { if(vm===11){setVy(y=>y+1);setVm(0);}else setVm(m=>m+1); };
  const getPct = d => {
    const key = `${vy}-${String(vm+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const applicable = tasks.filter(t => taskAppliesToDate(t,key));
    if (!applicable.length) return -1;
    const done = applicable.filter(t => (logs[key]||{})[t.id]).length;
    return done/applicable.length;
  };
  const goToDate = (key) => { setSelectedDate(key === todayStr ? null : key); setTab("today"); };
  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
        <button onClick={prevMonth} style={{ background:"#13132a", border:"none", color:"#e8e6f0", borderRadius:6, padding:"6px 14px", cursor:"pointer", fontFamily:"inherit", fontSize:13 }}>←</button>
        <div style={{ fontFamily:"'Syne',sans-serif", fontSize:17, fontWeight:700 }}>{MONTHS[vm]} {vy}</div>
        <button onClick={nextMonth} style={{ background:"#13132a", border:"none", color:"#e8e6f0", borderRadius:6, padding:"6px 14px", cursor:"pointer", fontFamily:"inherit", fontSize:13 }}>→</button>
      </div>
      <div style={{ fontSize:10, color:"#6e6e8a", letterSpacing:"1px", textAlign:"center", marginBottom:10, textTransform:"uppercase" }}>Tap any date to view its schedule →</div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4, marginBottom:6 }}>
        {WEEKDAYS.map(d => <div key={d} style={{ textAlign:"center", fontSize:10, color:"#6e6e8a" }}>{d}</div>)}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4 }}>
        {Array(firstDay).fill(null).map((_,i) => <div key={"e"+i} />)}
        {Array(daysInMonth).fill(null).map((_,i) => {
          const d = i+1;
          const pct = getPct(d);
          const key = `${vy}-${String(vm+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
          const isToday = key === todayStr;
          const isHovered = key === hoveredKey;
          const isFuture = key > todayStr;
          const bg = isHovered ? "#f9731640" : pct < 0 ? "#131328" : pct === 0 ? "#131328" : pct < 0.5 ? "#6d28d944" : pct < 1 ? "#f97316" : "#10b981";
          const applicable = tasks.filter(t => taskAppliesToDate(t, key));
          const done = applicable.filter(t => (logs[key]||{})[t.id]).length;
          return (
            <div key={d} onClick={() => goToDate(key)} onMouseEnter={() => setHoveredKey(key)} onMouseLeave={() => setHoveredKey(null)}
              style={{ aspectRatio:"1", borderRadius:8, background:bg, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", fontSize:11, color: isHovered?"#fff":pct>0?"#fff":"#525270", border: isToday?"2px solid #f97316":isHovered?"1px solid #f9731680":"1px solid #181830", fontWeight: isToday?700:400, cursor:"pointer", transition:"all 0.12s", transform: isHovered?"scale(1.08)":"scale(1)", position:"relative" }}>
              <span>{d}</span>
              {isHovered && <span style={{ fontSize:8, color:"rgba(255,255,255,.65)", marginTop:2, whiteSpace:"nowrap" }}>{applicable.length ? `${done}/${applicable.length}` : "—"}</span>}
            </div>
          );
        })}
      </div>
      <div style={{ display:"flex", gap:14, marginTop:14, flexWrap:"wrap" }}>
        {[["#131328","0%"],["#6d28d944","1–49%"],["#f97316","50–99%"],["#10b981","100%"]].map(([c,l]) => (
          <div key={l} style={{ display:"flex", alignItems:"center", gap:6, fontSize:11, color:"#a0a0bc" }}><div style={{ width:12, height:12, borderRadius:3, background:c, border:"1px solid #525270" }} /> {l}</div>
        ))}
      </div>
      <div style={{ marginTop:26 }}>
        <div style={{ fontSize:11, letterSpacing:"2px", color:"#a0a0bc", marginBottom:13, textTransform:"uppercase" }}>Last 7 Days</div>
        {Array(7).fill(null).map((_,i) => {
          const d = new Date(); d.setDate(d.getDate()-(6-i));
          const key = d.toLocaleDateString("en-CA",{timeZone:timezone});
          const applicable = tasks.filter(t => taskAppliesToDate(t,key));
          const done = applicable.filter(t => (logs[key]||{})[t.id]).length;
          const total = applicable.length;
          const p = total ? done/total : 0;
          return (
            <div key={key} onClick={() => goToDate(key)}
              style={{ display:"flex", alignItems:"center", gap:12, marginBottom:8, cursor:"pointer", borderRadius:6, padding:"3px 4px" }}
              onMouseEnter={e => e.currentTarget.style.background="#13132a"} onMouseLeave={e => e.currentTarget.style.background="transparent"}>
              <div style={{ width:34, fontSize:11, color:"#a0a0bc", textAlign:"right" }}>{WEEKDAYS[d.getDay()]}</div>
              <div style={{ flex:1, background:"#13132a", borderRadius:4, height:8, overflow:"hidden" }}>
                <div style={{ height:"100%", width:`${p*100}%`, background:p===1?"#10b981":"#f97316", borderRadius:4 }} />
              </div>
              <div style={{ width:40, fontSize:11, color:"#a0a0bc" }}>{done}/{total}</div>
              <div style={{ fontSize:10, color:"#f97316", opacity:.6 }}>→</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3, fontSize:11 }}>
